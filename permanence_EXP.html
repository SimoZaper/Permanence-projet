<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour de Permanence — EXP</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #1B2A4A;
  --primary-light: #2E4A7A;
  --secondary: #A8B4C4;
  --accent: #C0C8D4;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --dark: #1a252f;
  --light: #f0f2f5;
  --white: #ffffff;
  --text-primary: #1a252f;
  --text-secondary: #4a5568;
  --bg-primary: #f0f2f5;
  --bg-card: #ffffff;
  --border-color: #e2e8f0;
  --shadow: 0 2px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --transition: all 0.2s ease;
  --weekend-color: #3498db;
  --today-color: #f39c12;
  --double-color: #27ae60;
  --recup-color: #e67e22;
  --prev-color: #9b59b6;
}
[data-theme="dark"] {
  --bg-primary: #0f1923;
  --bg-card: #1a2535;
  --text-primary: #e2e8f0;
  --text-secondary: #a0aec0;
  --border-color: #2d3748;
  --shadow: 0 2px 4px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --primary: #2E4A7A;
  --primary-light: #3a5a9a;
  --light: #1a2535;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-width:1024px;transition:background 0.3s,color 0.3s}
body.arabic{font-family:'Cairo',sans-serif}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:3px}

/* ── LOGIN ── */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%)}
.login-box{background:var(--bg-card);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:380px;box-shadow:var(--shadow-md)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo h1{color:var(--primary);font-size:1.5rem;font-weight:700;margin-top:.5rem}
.login-logo p{color:var(--text-secondary);font-size:.85rem}
.login-logo .logo-icon{width:64px;height:64px;background:var(--primary);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--white);font-size:1.8rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:.4rem}
.form-control{width:100%;padding:.6rem .9rem;border:1.5px solid var(--border-color);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);font-size:.9rem;transition:var(--transition)}
.form-control:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(46,74,122,.15)}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:var(--radius);border:none;font-size:.875rem;font-weight:600;transition:var(--transition);white-space:nowrap}
.btn-primary{background:var(--primary);color:var(--white)}
.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:var(--white)}
.btn-success:hover{filter:brightness(1.1)}
.btn-warning{background:var(--warning);color:var(--white)}
.btn-warning:hover{filter:brightness(1.1)}
.btn-danger{background:var(--danger);color:var(--white)}
.btn-danger:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--secondary);color:var(--dark)}
.btn-secondary:hover{filter:brightness(.95)}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:var(--white)}
.btn-sm{padding:.35rem .7rem;font-size:.8rem}
.btn-lg{padding:.75rem 1.5rem;font-size:1rem}
.btn-block{width:100%;justify-content:center}
.login-error{background:#fde8e8;border:1px solid var(--danger);color:var(--danger);padding:.6rem .9rem;border-radius:var(--radius);font-size:.85rem;margin-top:.8rem;display:none}

/* ── APP LAYOUT ── */
#appPage{display:flex;flex-direction:column;min-height:100vh}
.app-header{background:var(--primary);color:var(--white);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.header-logo .logo-icon-sm{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.header-logo h1{font-size:1.05rem;font-weight:700;line-height:1.2}
.header-logo span{font-size:.75rem;opacity:.8}
.header-spacer{flex:1}
.header-controls{display:flex;align-items:center;gap:.6rem}
.lang-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:20px;overflow:hidden}
.lang-btn{padding:.3rem .8rem;border:none;background:transparent;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.lang-btn.active{background:rgba(255,255,255,.25);color:var(--white)}
.mode-badge{background:rgba(255,255,255,.15);padding:.25rem .7rem;border-radius:20px;font-size:.75rem;font-weight:600}
.user-info{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.1);padding:.3rem .8rem;border-radius:20px;font-size:.82rem}
.user-avatar{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700;font-size:.85rem}
.header-icon-btn{width:34px;height:34px;border:none;background:rgba(255,255,255,.1);color:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:var(--transition)}
.header-icon-btn:hover{background:rgba(255,255,255,.25)}
.app-navbar{background:var(--bg-card);border-bottom:2px solid var(--border-color);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:99;box-shadow:var(--shadow)}
.nav-tab{padding:.7rem 1.1rem;border:none;background:transparent;color:var(--text-secondary);font-size:.83rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;border-bottom:3px solid transparent;display:flex;align-items:center;gap:.35rem}
.nav-tab:hover{color:var(--primary);background:var(--light)}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--light)}
.app-main{flex:1;padding:1.2rem 1.5rem;display:flex;gap:1rem}
.content-area{flex:1;min-width:0}
.sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:.8rem}
.app-footer{background:var(--primary);color:rgba(255,255,255,.7);text-align:center;padding:.5rem;font-size:.78rem}

/* ── CARDS ── */
.card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:.8rem 1rem;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.95rem;font-weight:700;color:var(--text-primary)}
.card-body{padding:1rem}
.banner-card{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:var(--white);border-radius:var(--radius-lg);padding:1.2rem 1.5rem;display:flex;gap:1.5rem;align-items:center;margin-bottom:1rem}
.banner-item{text-align:center;flex:1}
.banner-item .val{font-size:1.6rem;font-weight:700;line-height:1}
.banner-item .lbl{font-size:.75rem;opacity:.8;margin-top:.25rem}
.banner-divider{width:1px;background:rgba(255,255,255,.2)}
.day-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.7rem;margin-bottom:1rem}
.day-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:.75rem;transition:var(--transition);border-left:3px solid transparent;cursor:pointer;position:relative}
.day-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.day-card.today{border-left-color:var(--today-color);background:linear-gradient(135deg,#fffdf0,var(--bg-card))}
.day-card.weekend{border-left-color:var(--weekend-color)}
.day-card.double{border-left-color:var(--double-color)}
.day-card.prev{border-left-color:var(--prev-color);opacity:.85}
.day-card.recup{border-left-color:var(--recup-color)}
.day-card-date{font-size:.72rem;color:var(--text-secondary);font-weight:600;margin-bottom:.3rem}
.day-card-day{font-size:.78rem;font-weight:700;color:var(--text-primary);margin-bottom:.5rem}
.day-card-avatar{width:44px;height:44px;border-radius:50%;background:var(--primary);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;margin:0 auto .4rem;overflow:hidden}
.day-card-avatar img{width:100%;height:100%;object-fit:cover}
.day-card-name{font-size:.82rem;font-weight:700;text-align:center;color:var(--text-primary)}
.day-card-mat{font-size:.72rem;color:var(--text-secondary);text-align:center}
.day-card-badges{display:flex;flex-wrap:wrap;gap:.25rem;justify-content:center;margin-top:.4rem}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:.2rem .5rem;border-radius:12px;font-size:.7rem;font-weight:700;line-height:1}
.badge-today{background:#fff3cd;color:#856404}
.badge-we{background:#cfe2ff;color:#084298}
.badge-double{background:#d1e7dd;color:#0f5132}
.badge-remplace{background:#f8d7da;color:#842029}
.badge-prev{background:#e8d5f5;color:#6f42c1}
.badge-recup{background:#ffd8b1;color:#7c4000}
.badge-conge{background:#d1ecf1;color:#0c5460}
.badge-mission{background:#fef3cd;color:#664d03}
.badge-maladie{background:#f8d7da;color:#842029}
.badge-success{background:#d1e7dd;color:#0f5132}
.badge-warning{background:#fff3cd;color:#856404}
.badge-danger{background:#f8d7da;color:#842029}
.badge-info{background:#cfe2ff;color:#084298}

/* ── TABLES ── */
.table-container{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:.855rem}
thead{background:var(--primary);color:var(--white)}
thead th{padding:.65rem .9rem;text-align:left;font-weight:600;white-space:nowrap;font-size:.82rem}
tbody tr{border-bottom:1px solid var(--border-color);transition:var(--transition)}
tbody tr:hover{background:var(--light)}
tbody td{padding:.6rem .9rem;vertical-align:middle}
tbody tr.today-row{background:#fffdf0}
tbody tr.weekend-row{background:#f0f7ff}
tbody tr.prev-row{background:#f8f0ff}
.table-actions{display:flex;gap:.35rem;align-items:center}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);width:90%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:scale(.95);transition:transform .2s}
.modal-overlay.show .modal{transform:scale(1)}
.modal-lg{max-width:720px}
.modal-xl{max-width:900px}
.modal-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-card);z-index:1}
.modal-title{font-size:1rem;font-weight:700}
.modal-close{width:30px;height:30px;border:none;background:var(--light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--text-secondary);cursor:pointer;transition:var(--transition)}
.modal-close:hover{background:var(--danger);color:var(--white)}
.modal-body{padding:1.2rem}
.modal-footer{padding:.8rem 1.2rem;border-top:1px solid var(--border-color);display:flex;gap:.5rem;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg-card)}

/* ── FORMS ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.83rem;font-weight:600;color:var(--text-secondary);margin-bottom:.35rem}
.form-group .form-control{width:100%;padding:.55rem .8rem;border:1.5px solid var(--border-color);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);font-size:.875rem;transition:var(--transition)}
.form-group .form-control:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(46,74,122,.12)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:70px}
.form-hint{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem}
.form-check{display:flex;align-items:center;gap:.5rem;cursor:pointer}
.form-check input[type=checkbox]{width:16px;height:16px;cursor:pointer}

/* ── SIDEBAR ── */
.sidebar-card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.sidebar-card-header{background:var(--primary);color:var(--white);padding:.6rem .9rem;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.sidebar-card-body{padding:.7rem}
.sidebar-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .3rem;border-bottom:1px solid var(--border-color)}
.sidebar-item:last-child{border-bottom:none}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;overflow:hidden}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-item-info{flex:1;min-width:0}
.sidebar-item-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item-sub{font-size:.72rem;color:var(--text-secondary)}
.alert-item{display:flex;align-items:flex-start;gap:.5rem;padding:.45rem;border-radius:var(--radius);margin-bottom:.4rem;font-size:.8rem}
.alert-item.warn{background:#fff3cd;color:#856404}
.alert-item.danger{background:#f8d7da;color:#842029}
.alert-item.info{background:#cfe2ff;color:#084298}

/* ── AGENT CARDS ── */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.agent-card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:1.2rem;text-align:center;transition:var(--transition);border:2px solid transparent}
.agent-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-light)}
.agent-card.inactive{opacity:.6}
.agent-avatar-lg{width:70px;height:70px;border-radius:50%;background:var(--primary);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.8rem;margin:0 auto .8rem;overflow:hidden;position:relative}
.agent-avatar-lg img{width:100%;height:100%;object-fit:cover}
.agent-rank{position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--primary-light);color:var(--white);border-radius:50%;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg-card)}
.agent-name{font-size:1rem;font-weight:700;margin-bottom:.15rem}
.agent-mat{font-size:.78rem;color:var(--text-secondary);margin-bottom:.5rem}
.agent-stats{display:flex;justify-content:space-around;margin:.8rem 0;padding:.6rem 0;border-top:1px solid var(--border-color);border-bottom:1px solid var(--border-color)}
.agent-stat{text-align:center}
.agent-stat .n{font-size:1.1rem;font-weight:700;color:var(--primary)}
.agent-stat .l{font-size:.68rem;color:var(--text-secondary)}
.agent-card-actions{display:flex;gap:.4rem;justify-content:center;margin-top:.6rem}

/* ── PLANNING VIEWS ── */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border-color);border-radius:var(--radius);overflow:hidden}
.cal-header{background:var(--primary);color:var(--white);padding:.5rem;text-align:center;font-size:.8rem;font-weight:700}
.cal-cell{background:var(--bg-card);padding:.4rem;min-height:70px;cursor:pointer;transition:var(--transition)}
.cal-cell:hover{background:var(--light)}
.cal-cell.today{background:#fffdf0;border:2px solid var(--today-color)}
.cal-cell.weekend{background:#f0f7ff}
.cal-cell.prev{background:#f8f0ff}
.cal-cell.other-month{opacity:.4}
.cal-date{font-size:.75rem;font-weight:700;margin-bottom:.2rem;color:var(--text-secondary)}
.cal-agent{font-size:.72rem;background:var(--primary);color:var(--white);border-radius:4px;padding:.1rem .3rem;display:inline-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.week-view{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem}
.week-day-col{background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.week-day-header{background:var(--primary);color:var(--white);padding:.5rem;text-align:center;font-size:.8rem;font-weight:700}
.week-day-header.today-header{background:var(--today-color)}
.week-day-header.weekend-header{background:var(--weekend-color)}
.week-day-body{padding:.6rem;min-height:80px}

/* ── TABS within tabs ── */
.sub-tabs{display:flex;border-bottom:2px solid var(--border-color);margin-bottom:1rem;gap:.25rem}
.sub-tab{padding:.5rem 1rem;border:none;background:transparent;color:var(--text-secondary);font-size:.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition)}
.sub-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.sub-tab-content{display:none}
.sub-tab-content.active{display:block}

/* ── FILTERS ── */
.filters-bar{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;background:var(--bg-card);padding:.8rem;border-radius:var(--radius);box-shadow:var(--shadow)}
.filter-group{display:flex;align-items:center;gap:.4rem;font-size:.83rem}
.filter-group label{font-weight:600;color:var(--text-secondary);white-space:nowrap}
.filter-group select,.filter-group input{padding:.35rem .6rem;border:1.5px solid var(--border-color);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);font-size:.82rem}

/* ── STATS / DASHBOARD ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1rem}
.stat-card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:1rem;display:flex;align-items:center;gap:.8rem}
.stat-icon{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-icon.blue{background:#cfe2ff;color:#084298}
.stat-icon.green{background:#d1e7dd;color:#0f5132}
.stat-icon.orange{background:#ffd8b1;color:#7c4000}
.stat-icon.purple{background:#e8d5f5;color:#6f42c1}
.stat-info .n{font-size:1.6rem;font-weight:700;line-height:1;color:var(--text-primary)}
.stat-info .l{font-size:.75rem;color:var(--text-secondary)}
.chart-container{position:relative;background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:1rem;margin-bottom:1rem}
.chart-title{font-size:.9rem;font-weight:700;margin-bottom:.8rem;color:var(--text-primary)}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:1rem}

/* ── PREVIOUS TOURS ── */
.prev-tours-table{width:100%;border-collapse:collapse;font-size:.855rem}
.prev-tours-table th{background:var(--primary);color:var(--white);padding:.6rem .9rem;text-align:left;font-size:.82rem}
.prev-tours-table td{padding:.55rem .9rem;border-bottom:1px solid var(--border-color);vertical-align:middle}
.prev-tours-table tr:hover td{background:var(--light)}
.prev-agent-badges{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.prev-agent-badge{display:inline-flex;align-items:center;gap:.25rem;background:var(--primary);color:var(--white);border-radius:20px;padding:.15rem .55rem;font-size:.75rem;font-weight:600}
.prev-agent-badge .remove-badge{cursor:pointer;opacity:.7;font-size:.85rem;line-height:1;margin-left:.1rem}
.prev-agent-badge .remove-badge:hover{opacity:1}
.quick-agents{display:flex;flex-wrap:wrap;gap:.5rem;padding:.8rem}
.quick-agent-btn{padding:.5rem 1rem;border:2px solid var(--border-color);border-radius:var(--radius);background:var(--bg-card);cursor:pointer;font-size:.85rem;font-weight:600;transition:var(--transition)}

// FNV-1a 32-bit hash — much harder to reverse than base64, no async needed
function hashPwd(str) {
  const SALT = 'EXP_PERM_2025';
  const input = SALT + str;
  let h = 2166136261;
  for (let i = 0; i < input.length; i++) {
    h ^= input.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0).toString(16).padStart(8, '0');
}
// Migrate legacy btoa passwords on load
function migratePassword(stored) {
  // If it looks like a btoa string (base64, not 8-char hex), migrate it
  if (stored && stored.length !== 8) {
    try { return hashPwd(atob(stored)); } catch(e) { return stored; }
  }
  return stored;
}

// Migrate prevTours from old flat format [{dateISO, agentNom, matricule, obs}]
// to new grouped format [{dateISO, agents:[{nom, matricule, officiel}], obs}]
function migratePrevTours(arr) {
  if (!arr || !arr.length) return arr || [];
  // Detect old format: first entry has agentNom but no agents array
  const needsMigration = arr.some(r => r.agentNom && !Array.isArray(r.agents));
  if (!needsMigration) return arr;
  const byDate = {};
  arr.forEach(r => {
    if (!r.dateISO) return;
    if (!byDate[r.dateISO]) byDate[r.dateISO] = { dateISO: r.dateISO, agents: [], obs: r.obs || '' };
    if (r.agentNom) {
      byDate[r.dateISO].agents.push({ nom: r.agentNom, matricule: r.matricule || 0, officiel: true });
    }
  });
  return Object.values(byDate).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang: STATE.lang, theme: STATE.theme,
      agents: STATE.agents, planning: STATE.planning,
      repos: STATE.repos, echanges: STATE.echanges,
      logs: STATE.logs, connexions: STATE.connexions.slice(-MAX_CONNEXIONS_RETAINED),
      prevTours: STATE.prevTours, settings: STATE.settings,
      users: STATE.users
    }));
  } catch(e) {
    // Notify user if storage is unavailable or full
    const msg = (e.name === 'QuotaExceededError') ? 'Stockage local plein. Exportez et nettoyez les données.' : 'Sauvegarde impossible: ' + e.message;
    console.warn('Storage error:', e);
    showToast(msg, 'warning');
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    STATE.lang = data.lang || 'fr';
    STATE.theme = data.theme || 'light';
    STATE.agents = data.agents && data.agents.length ? data.agents : JSON.parse(JSON.stringify(AGENTS_INIT));
    STATE.planning = data.planning || [];
    STATE.repos = data.repos || [];
    STATE.echanges = data.echanges || [];
    STATE.logs = data.logs || [];
    STATE.connexions = data.connexions || [];
    STATE.prevTours = migratePrevTours(data.prevTours || []);
    STATE.settings = Object.assign({
      mode:'SEMTA', modeChangedDate:null, alertThresholdDays: DEFAULT_ALERT_THRESHOLD, historyDays:16,
      cycleIndex:0, cycleIndexSemaine:0, cycleIndexWeekend:0, nextGenDate:null
    }, data.settings || {});
    if (data.users && data.users.length) {
      // Migrate any legacy btoa-encoded passwords
      STATE.users = data.users.map(u => ({ ...u, password: migratePassword(u.password) }));
    }
    return true;
  } catch(e) {
    console.warn('Load error:', e.message);
    showToast('Erreur de chargement des données: ' + e.message + '. Les données par défaut seront utilisées.', 'warning');
    return false;
  }
}

// DATE UTILITIES
// ════════════════════════════════════════════════════════════
function toISO(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fromISO(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  return d + '/' + m + '/' + y;
}
function formatDateTime(dt) {
  return ('0'+dt.getDate()).slice(-2)+'/'+('0'+(dt.getMonth()+1)).slice(-2)+'/'+dt.getFullYear()+
         ' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2)+':'+('0'+dt.getSeconds()).slice(-2);
}
function addDays(iso, n) {
  const d = fromISO(iso);
  d.setDate(d.getDate() + n);
  return toISO(d);
}
function diffDays(iso1, iso2) {
  return Math.round((fromISO(iso2) - fromISO(iso1)) / 86400000);
}
function todayISO() { return toISO(new Date()); }
function dowOf(iso) { return fromISO(iso).getDay(); } // 0=Sun,1=Mon,...,6=Sat
function isWeekend(iso) { const d = dowOf(iso); return d === 0 || d === 6; }
function jourFR(iso) { return JOURS_FR[dowOf(iso)]; }
function jourAR(iso) { return JOURS_AR[dowOf(iso)]; }
function getMonthKey(iso) { return iso.substring(0,7); }

// ════════════════════════════════════════════════════════════
// PLANNING ENGINE — Business Rules R01-R08
// ════════════════════════════════════════════════════════════

// R02/R03: Compute recovery day ISO for a given duty day
function getRecupISO(dutyISO) {
  const dow = dowOf(dutyISO);
  if (dow === 6) { // Saturday → recovery on Tuesday (J+3)
    return addDays(dutyISO, 3);
  }
  // Weekday (Mon-Fri) or Sunday → recovery next day (J+1)
  return addDays(dutyISO, 1);
}

// Check if an agent is on approved leave/absence on a given date
function isOnLeave(agentNom, dateISO) {
  return STATE.repos.some(r => r.agent === agentNom && r.debut <= dateISO && r.fin >= dateISO);
}

// R04: Check if agent is on day-1 return from leave (was on leave yesterday, not today)
function isDay1Return(agentNom, dateISO) {
  const yesterday = addDays(dateISO, -1);
  return isOnLeave(agentNom, yesterday) && !isOnLeave(agentNom, dateISO);
}

// R02/R03: Check if agent is in recovery on a given date
// Build a recovery set from planning entries
function getRecupSet(planning) {
  const recupMap = {}; // dateISO => Set of agent names in recovery
  planning.forEach(entry => {
    entry.agents.forEach(a => {
      if (a.officiel) {
        const recupDate = getRecupISO(entry.dateISO);
        if (!recupMap[recupDate]) recupMap[recupDate] = new Set();
        recupMap[recupDate].add(a.nom);
      }
    });
  });
  return recupMap;
}

// Check availability for a specific date given existing planning
function isAvailable(agentNom, dateISO, recupMap) {
  if (isOnLeave(agentNom, dateISO)) return false;
  if (isDay1Return(agentNom, dateISO)) return false;
  if (recupMap[dateISO] && recupMap[dateISO].has(agentNom)) return false;
  return true;
}

// Vérifie si l'agent a eu au moins un jour de son tour manqué pendant son absence.
// On considère que son tour était "manqué" si, pendant la période [debut, fin],
// il y a un jour dans le planning où ce n'est PAS lui l'agent officiel assigné,
// mais où c'était son tour dans le cycle (c'est-à-dire qu'il aurait dû être assigné
// sans son absence, i.e. getDutyAgentIdx aurait retourné son index sans l'absence).
// Approche simplifiée : vérifier si pendant l'absence, un des jours planifiés
// a un agent officiel différent de lui (ce qui signifie qu'il a été sauté).
function wasTurnMissedDuringLeave(agentNom, debut, fin) {
  let d = debut;
  while (d <= fin) {
    const entry = STATE.planning.find(e => e.dateISO === d && !e.isPrev);
    if (entry) {
      const officialAgent = entry.agents.find(a => a.officiel);
      // Si un autre agent a fait la permanence à sa place ce jour-là,
      // cela signifie qu'il a été sauté (son tour a été perturbé)
      if (officialAgent && officialAgent.nom !== agentNom) {
        // Vérifier que ce jour était bien "son tour" dans le cycle
        // en vérifiant si l'agent précédent dans le planning était avant lui dans le cycle
        // Approche pragmatique : si l'agent est absent ET qu'un autre a fait la perm ce jour,
        // on vérifie si c'était effectivement son tour en regardant le cycle
        const cycleAgents = (STATE.settings.mode === 'SEMTA')
          ? buildCycleFromPrevTours(STATE.prevTours, STATE.agents)
          : getActiveSorted();
        if (!cycleAgents.length) { d = addDays(d, 1); continue; }
        
        // Trouver l'entrée précédente dans le planning (avant cette date)
        const prevEntry = STATE.planning
          .filter(e => !e.isPrev && e.dateISO < d)
          .sort((a, b) => b.dateISO.localeCompare(a.dateISO))[0];
        
        if (prevEntry) {
          const prevOfficialAgent = prevEntry.agents.find(a => a.officiel);
          if (prevOfficialAgent) {
            const prevIdx = cycleAgents.findIndex(a => a.nom === prevOfficialAgent.nom);
            if (prevIdx >= 0) {
              const expectedIdx = (prevIdx + 1) % cycleAgents.length;
              const expectedAgent = cycleAgents[expectedIdx];
              // Si l'agent attendu est bien notre agent absent → son tour a été sauté
              if (expectedAgent && expectedAgent.nom === agentNom) {
                return true; // Tour manqué confirmé
              }
            }
          }
        } else {
          // Pas d'entrée précédente → premier jour du planning, on considère que c'est son tour
          const agentIdx = cycleAgents.findIndex(a => a.nom === agentNom);
          if (agentIdx === 0) return true;
        }
      }
    }
    d = addDays(d, 1);
  }
  return false;
}

// R04+: Forced return — On fin+2 (the day after the return-rest day), the agent
// who was on leave is forcibly assigned to permanence.
// Called after every planning build/rebuild.
function applyForcedReturns() {
  if (!STATE.repos.length) return;
  // Process repos in chronological order to avoid cycle desync when multiple forced returns chain
  const sorted = [...STATE.repos].sort((a, b) => a.fin.localeCompare(b.fin));
  sorted.forEach(r => {
    const forcedDate = addDays(r.fin, 2);
    const agentObj = STATE.agents.find(a => a.nom === r.agent && a.actif);
    if (!agentObj) return;
    // Skip if agent is still on another leave on the forced date
    if (isOnLeave(r.agent, forcedDate)) return;
    // ← NOUVELLE RÈGLE : ne forcer que si l'absence a perturbé le tour de l'agent
    if (!wasTurnMissedDuringLeave(r.agent, r.debut, r.fin)) return;
    const entry = STATE.planning.find(e => e.dateISO === forcedDate && !e.isPrev);
    if (!entry) return;
    // If agent is already assigned, just mark the entry
    const alreadyAssigned = entry.agents.some(a => a.nom === agentObj.nom);
    if (alreadyAssigned) {
      entry.forcedReturn = true;
    } else {
      // Replace the scheduled agent with the returning agent
      entry.agents = [{ nom: agentObj.nom, matricule: agentObj.matricule, officiel: true, remplacePar: null, motifEchange: 'Retour congé (J+2)' }];
      entry.forcedReturn = true;
    }
    // Recalculate the cycle from forcedDate+1 so rotation stays in sync
    const nextDay = addDays(forcedDate, 1);
    const mode = STATE.settings.mode;
    const cycleAgents = (mode === 'SEMTA')
      ? buildCycleFromPrevTours(STATE.prevTours, STATE.agents)
      : getActiveSorted();
    if (cycleAgents.length) {
      const forcedIdx = cycleAgents.findIndex(a => a.nom === agentObj.nom);
      const nextIdx = forcedIdx >= 0 ? (forcedIdx + 1) % cycleAgents.length : 0;
      const before = STATE.planning.filter(e => e.dateISO < nextDay);
      const future = generatePlanning(nextDay, 365, {
        mode,
        cycleIndex: nextIdx,
        cycleIndexSemaine: nextIdx,
        cycleIndexWeekend: nextIdx
      }, cycleAgents);
      STATE.planning = [...before, ...future];
    }
  });
}

// Auto-alimente STATE.prevTours avec tous les jours passés du planning
// qui ne sont pas encore enregistrés dans prevTours.
function syncPastPlanningToPrevTours() {
  const today = todayISO();
  STATE.planning.forEach(entry => {
    if (entry.dateISO >= today) return; // seulement les jours passés (hier et avant)
    // Vérifier si cette date est déjà dans prevTours
    const existing = STATE.prevTours.find(r => r.dateISO === entry.dateISO);
    if (existing) return; // déjà présent, ne pas écraser
    // Ajouter les agents officiels de cette entrée dans prevTours
    const officialAgents = entry.agents.filter(a => a.officiel).map(a => ({
      nom: a.nom,
      matricule: a.matricule || 0
    }));
    if (!officialAgents.length) return;
    STATE.prevTours.push({
      dateISO: entry.dateISO,
      agents: officialAgents,
      obs: entry.obs || ''
    });
  });
  // Trier prevTours par date
  STATE.prevTours.sort((a, b) => a.dateISO.localeCompare(b.dateISO));
}

// R01/R05: Get the duty agent starting from cycleIdx, skipping unavailables
function getDutyAgentIdx(cycleIdx, dateISO, agents, recupMap) {
  const n = agents.length;
  for (let i = 0; i < n; i++) {
    const idx = (cycleIdx + i) % n;
    const agent = agents[idx];
    if (isAvailable(agent.nom, dateISO, recupMap)) {
      return idx;
    }
  }
  // All unavailable — fallback to cycleIdx.
  // Agent at cycleIdx will be assigned even though marked unavailable; admin should review.
  console.warn('[Planning] All agents unavailable on ' + dateISO + ', assigning agent at index ' + cycleIdx + ' despite unavailability');
  showToast(t('allUnavailableToast').replace('%s', dateISO), 'warning');
  return cycleIdx;
}

// R07: Is this day a "semaine" day?
function isSemaineDay(dow) { return dow >= 1 && dow <= 5; }
function isWeekendDay(dow) { return dow === 0 || dow === 6; }

// Core planning generation
// Returns array of planning entries for daysCount days starting from startISO
// initialCycleState = { mode, cycleIndex, cycleIndexSemaine, cycleIndexWeekend }
function generatePlanning(startISO, daysCount, cycleState, agents, agentsWE) {
  const plan = [];
  const recupMap = {};
  let { mode, cycleIndex, cycleIndexSemaine, cycleIndexWeekend } = cycleState;
  const agentsSem = agents;
  const agentsWeekend = (mode === 'TWEK' && agentsWE) ? agentsWE : agents;
  const n = agents.length;
  const nSem = agentsSem.length;
  const nWE = agentsWeekend.length;
  if (n === 0) return [];

  for (let i = 0; i < daysCount; i++) {
    const dateISO = addDays(startISO, i);
    const dow = dowOf(dateISO);

    // Determine which cycle index and agent pool to use
    let idx, curAgents, curN;
    if (mode === 'TWEK') {
      if (isSemaineDay(dow)) {
        idx = cycleIndexSemaine; curAgents = agentsSem; curN = nSem;
      } else {
        idx = cycleIndexWeekend; curAgents = agentsWeekend; curN = nWE;
      }
    } else {
      idx = cycleIndex; curAgents = agents; curN = n;
    }

    // Find available agent (R01/R05)
    const dutyIdx = getDutyAgentIdx(idx, dateISO, curAgents, recupMap);
    const agent = curAgents[dutyIdx];

    // Create entry
    const entry = {
      dateISO,
      date: formatDate(dateISO),
      jour: JOURS_FR[dow],
      jourAr: JOURS_AR[dow],
      dow,
      agents: [{ nom: agent.nom, matricule: agent.matricule, officiel: true, remplacePar: null, motifEchange: '' }],
      obs: '', obsAr: '',
      isWeekend: isWeekend(dateISO),
      isPrev: false,
      modified: false, modifiedBy: '', modifMotif: '', modifDate: ''
    };
    plan.push(entry);

    // Add recovery for this duty agent
    const recupDate = getRecupISO(dateISO);
    if (!recupMap[recupDate]) recupMap[recupDate] = new Set();
    recupMap[recupDate].add(agent.nom);

    // Advance cycle: next agent after dutyIdx (R01)
    const nextIdx = (dutyIdx + 1) % curN;
    if (mode === 'TWEK') {
      if (isSemaineDay(dow)) cycleIndexSemaine = nextIdx;
      else cycleIndexWeekend = nextIdx;
    } else {
      cycleIndex = nextIdx;
    }
  }

  return plan;
}

// Calculate cycle state from prevTours array
// prevTours: new format [{dateISO, agents:[{nom,matricule}], obs}]
//         or old flat format [{dateISO, agentNom, matricule}] (for backward compat)
// Returns { cycleIndex, cycleIndexSemaine, cycleIndexWeekend, nextStartISO }
function calcCycleFromPrev(prevTours, agents, mode) {
  if (!prevTours.length) return { cycleIndex:0, cycleIndexSemaine:0, cycleIndexWeekend:0, nextStartISO: todayISO() };
  const n = agents.length;

  // Normalize to flat format: [{dateISO, agentNom, matricule}]
  const flat = [];
  prevTours.forEach(r => {
    if (Array.isArray(r.agents)) {
      r.agents.forEach(a => flat.push({ dateISO: r.dateISO, agentNom: a.nom, matricule: a.matricule || 0 }));
    } else if (r.agentNom) {
      flat.push({ dateISO: r.dateISO, agentNom: r.agentNom, matricule: r.matricule || 0 });
    }
  });
  if (!flat.length) return { cycleIndex:0, cycleIndexSemaine:0, cycleIndexWeekend:0, nextStartISO: todayISO() };

  const sorted = flat.sort((a,b) => a.dateISO.localeCompare(b.dateISO));

  // For each day in prevTours, determine what the next cycle index should be
  // Group by date to handle doubles (R06)
  const byDate = {};
  sorted.forEach(pt => {
    if (!byDate[pt.dateISO]) byDate[pt.dateISO] = [];
    byDate[pt.dateISO].push(pt);
  });

  let cycleIndex = 0;
  let cycleIndexSemaine = 0;
  let cycleIndexWeekend = 0;

  const dates = Object.keys(byDate).sort();
  let lastDate = dates[dates.length-1];

  dates.forEach(dateISO => {
    const entries = byDate[dateISO];
    const dow = dowOf(dateISO);

    if (entries.length === 1) {
      // Single agent: next is dutyIdx+1
      const agentNom = entries[0].agentNom || entries[0].nom;
      const agentIdx = agents.findIndex(a => a.nom === agentNom);
      const dutyIdx = agentIdx >= 0 ? agentIdx : 0;
      const nextIdx = (dutyIdx + 1) % n;
      if (mode === 'TWEK') {
        if (isSemaineDay(dow)) cycleIndexSemaine = nextIdx;
        else cycleIndexWeekend = nextIdx;
      } else {
        cycleIndex = nextIdx;
      }
    } else {
      // R06 Multiple agents: youngest (max matricule) represents position
      const youngest = entries.reduce((a,b) => (b.matricule||0) > (a.matricule||0) ? b : a);
      const agentNom = youngest.agentNom || youngest.nom;
      const agentIdx = agents.findIndex(a => a.nom === agentNom);
      const dutyIdx = agentIdx >= 0 ? agentIdx : 0;
      const nextIdx = (dutyIdx + 1) % n;
      if (mode === 'TWEK') {
        if (isSemaineDay(dow)) cycleIndexSemaine = nextIdx;
        else cycleIndexWeekend = nextIdx;
      } else {
        cycleIndex = nextIdx;
      }
    }
  });

  const nextStartISO = addDays(lastDate, 1);
  return { cycleIndex, cycleIndexSemaine, cycleIndexWeekend, nextStartISO };
}

// ════════════════════════════════════════════════════════════
// CYCLE ROTATION — buildCycleFromPrevTours / getNextAgentInCycle
// ════════════════════════════════════════════════════════════

/**
 * Builds the ordered rotation cycle from prevTours history.
 * Rules:
 *  - Only the LAST appearance of each agent determines their position.
 *  - Multiple agents on the same day are ordered by descending matricule.
 *  - Only active agents are included.
 * @param {Array} prevTours - [{dateISO, agents:[{nom,matricule}], obs}]
 * @param {Array} allAgents - Full agents list (used to filter active ones)
 * @returns {Array} Ordered cycle [{nom, matricule}]
 */
function buildCycleFromPrevTours(prevTours, allAgents) {
  const activeAgents = (allAgents || STATE.agents).filter(a => a.actif);
  if (!prevTours || prevTours.length === 0) {
    return activeAgents.sort((a, b) => a.matricule - b.matricule);
  }

  // STEP 1: Find last appearance date for each agent
  const lastAppearance = {};
  prevTours.forEach(tour => {
    (tour.agents || []).forEach(agent => {
      lastAppearance[agent.nom] = tour.dateISO;
    });
  });
  console.log('[Cycle] Dernières apparitions:', lastAppearance);

  // STEP 2: Build cycle chronologically (oldest → newest)
  const cycle = [];
  const processed = new Set();
  const sortedTours = [...prevTours].sort((a, b) => a.dateISO.localeCompare(b.dateISO));

  sortedTours.forEach(tour => {
    // Sort agents by descending matricule for this day
    const tourAgents = (tour.agents || []).slice().sort((a, b) => b.matricule - a.matricule);
    tourAgents.forEach(agent => {
      const isLastAppearance = lastAppearance[agent.nom] === tour.dateISO;
      const notYetAdded = !processed.has(agent.nom);
      if (isLastAppearance && notYetAdded) {
        // Only include active agents
        const agentData = activeAgents.find(a => a.nom === agent.nom);
        if (agentData) {
          cycle.push({ nom: agent.nom, matricule: agentData.matricule });
          processed.add(agent.nom);
        }
      }
    });
  });

  console.log('[Cycle] Cycle construit:', cycle.map((a, i) => (i + 1) + '. ' + a.nom + ' (' + a.matricule + ')'));
  return cycle;
}

function buildCycleFromFilteredTours(filteredPrevTours, allAgents) {
  const activeAgents = (allAgents || STATE.agents).filter(a => a.actif);
  if (!filteredPrevTours || filteredPrevTours.length === 0) {
    return activeAgents.sort((a, b) => a.matricule - b.matricule);
  }
  const lastAppearance = {};
  filteredPrevTours.forEach(tour => {
    (tour.agents || []).forEach(agent => { lastAppearance[agent.nom] = tour.dateISO; });
  });
  const cycle = [];
  const processed = new Set();
  const sortedTours = [...filteredPrevTours].sort((a, b) => a.dateISO.localeCompare(b.dateISO));
  sortedTours.forEach(tour => {
    const tourAgents = (tour.agents || []).slice().sort((a, b) => b.matricule - a.matricule);
    tourAgents.forEach(agent => {
      const isLastAppearance = lastAppearance[agent.nom] === tour.dateISO;
      const notYetAdded = !processed.has(agent.nom);
      if (isLastAppearance && notYetAdded) {
        const agentData = activeAgents.find(a => a.nom === agent.nom);
        if (agentData) { cycle.push({ nom: agent.nom, matricule: agentData.matricule }); processed.add(agent.nom); }
      }
    });
  });
  activeAgents.sort((a, b) => a.matricule - b.matricule).forEach(a => {
    if (!processed.has(a.nom)) cycle.push({ nom: a.nom, matricule: a.matricule });
  });
  return cycle;
}

function buildCycleFromPrevToursSem(prevTours, allAgents) {
  const filtered = prevTours.filter(t => isSemaineDay(dowOf(t.dateISO)));
  return buildCycleFromFilteredTours(filtered, allAgents);
}

function buildCycleFromPrevToursWE(prevTours, allAgents) {
  const filtered = prevTours.filter(t => isWeekendDay(dowOf(t.dateISO)));
  return buildCycleFromFilteredTours(filtered, allAgents);
}

/**
 * Returns the next agent in the rotation cycle after lastAgentName.
 * Wraps around to the start of the cycle.
 * @param {Array} cycle - Ordered cycle [{nom, matricule}]
 * @param {String} lastAgentName - Name of the last agent on duty
 * @returns {Object|null} Next agent {nom, matricule}
 */
function getNextAgentInCycle(cycle, lastAgentName) {
  if (!cycle || cycle.length === 0) return null;
  const currentIndex = cycle.findIndex(a => a.nom === lastAgentName);
  if (currentIndex === -1) return cycle[0];
  return cycle[(currentIndex + 1) % cycle.length];
}

// ════════════════════════════════════════════════════════════
// PLANNING MERGE: combine prevTours + generated future
// ════════════════════════════════════════════════════════════
function buildFullPlanning(prevToursRows, agents, mode) {
  const sorted = getActiveSorted();
  if (!sorted.length) return [];

  // Convert prevTours rows to planning entries
  // Support both new format [{dateISO, agents:[{nom,matricule,officiel}], obs}]
  // and old flat format [{dateISO, agentNom, matricule, obs}]
  const prevEntries = [];
  const byDate = {};
  prevToursRows.forEach(r => {
    if (!r.dateISO) return;
    if (!byDate[r.dateISO]) byDate[r.dateISO] = [];
    if (Array.isArray(r.agents)) {
      r.agents.forEach(a => {
        const agentObj = getAgentByName(a.nom);
        byDate[r.dateISO].push({
          nom: a.nom,
          matricule: agentObj ? agentObj.matricule : (a.matricule || 0),
          officiel: a.officiel !== false,
          remplacePar: null,
          motifEchange: ''
        });
      });
    } else if (r.agentNom) {
      const agentObj = getAgentByName(r.agentNom);
      byDate[r.dateISO].push({
        nom: r.agentNom,
        matricule: agentObj ? agentObj.matricule : (r.matricule || 0),
        officiel: true,
        remplacePar: null,
        motifEchange: ''
      });
    }
  });
  Object.keys(byDate).sort().forEach(dateISO => {
    if (!byDate[dateISO].length) return;
    const dow = dowOf(dateISO);
    const obs = (prevToursRows.find(r => r.dateISO === dateISO) || {}).obs || '';
    prevEntries.push({
      dateISO, date: formatDate(dateISO),
      jour: JOURS_FR[dow], jourAr: JOURS_AR[dow], dow,
      agents: byDate[dateISO],
      obs, obsAr: '', isWeekend: isWeekend(dateISO),
      isPrev: true, modified: false, modifiedBy: '', modifMotif: '', modifDate: ''
    });
  });
  prevEntries.sort((a,b) => a.dateISO.localeCompare(b.dateISO));

  let cycleAgents, cycleAgentsWE, cycleIndex, cycleIndexSemaine, cycleIndexWeekend, nextStartISO;

  if (mode === 'TWEK') {
    const cycleSem = buildCycleFromPrevToursSem(prevToursRows, STATE.agents);
    const cycleWE  = buildCycleFromPrevToursWE(prevToursRows, STATE.agents);
    cycleAgents    = cycleSem.length ? cycleSem : sorted;
    cycleAgentsWE  = cycleWE.length  ? cycleWE  : sorted;
    const sortedPrevSem = prevToursRows.filter(r => r.dateISO && isSemaineDay(dowOf(r.dateISO))).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    const sortedPrevWE  = prevToursRows.filter(r => r.dateISO && isWeekendDay(dowOf(r.dateISO))).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    const lastSemNom = sortedPrevSem.length > 0 ? ((sortedPrevSem[sortedPrevSem.length-1].agents || [])[0] || {}).nom : null;
    const lastWENom  = sortedPrevWE.length  > 0 ? ((sortedPrevWE[sortedPrevWE.length-1].agents  || [])[0] || {}).nom : null;
    const nextSemAgent = getNextAgentInCycle(cycleAgents, lastSemNom);
    const nextWEAgent  = getNextAgentInCycle(cycleAgentsWE, lastWENom);
    cycleIndexSemaine = nextSemAgent ? cycleAgents.findIndex(a => a.nom === nextSemAgent.nom) : 0;
    cycleIndexWeekend = nextWEAgent  ? cycleAgentsWE.findIndex(a => a.nom === nextWEAgent.nom) : 0;
    if (cycleIndexSemaine < 0) cycleIndexSemaine = 0;
    if (cycleIndexWeekend < 0) cycleIndexWeekend = 0;
    cycleIndex = 0;
    const sortedPrevAll = [...prevToursRows].filter(r => r.dateISO).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    nextStartISO = sortedPrevAll.length > 0 ? addDays(sortedPrevAll[sortedPrevAll.length - 1].dateISO, 1) : todayISO();
  } else {
    cycleAgentsWE = null;
    // New cycle-based approach for SEMTA mode
    cycleAgents = buildCycleFromPrevTours(prevToursRows, STATE.agents);
    if (!cycleAgents.length) cycleAgents = sorted;
    const sortedPrev = [...prevToursRows].filter(r => r.dateISO).sort((a, b) => a.dateISO.localeCompare(b.dateISO));
    nextStartISO = sortedPrev.length > 0 ? addDays(sortedPrev[sortedPrev.length - 1].dateISO, 1) : todayISO();
    cycleIndex = 0;
    cycleIndexSemaine = 0;
    cycleIndexWeekend = 0;
    console.log('[Cycle] Départ planning futur depuis index 0 (' + (cycleAgents[0] ? cycleAgents[0].nom : '?') + ') le ' + nextStartISO);
  }

  // Generate 1 year from nextStartISO
  const futureEntries = generatePlanning(nextStartISO, 365, {
    mode, cycleIndex, cycleIndexSemaine, cycleIndexWeekend
  }, cycleAgents, cycleAgentsWE);

  return [...prevEntries, ...futureEntries];
}

// Rebuild future planning from a given date (for recalculation after changes)
function rebuildFrom(fromISO) {
  const agents = getActiveSorted();
  if (!agents.length) return;

  // Keep entries before fromISO
  const before = STATE.planning.filter(e => e.dateISO < fromISO);

  const mode = STATE.settings.mode;
  let cycleAgents, cycleAgentsWE, cycleIndex, cycleIndexSemaine, cycleIndexWeekend;

  if (mode === 'TWEK') {
    // Collect prev tours before fromISO for cycle reconstruction
    const prevForCalcTwek = [];
    STATE.prevTours.forEach(r => {
      if (r.dateISO >= fromISO) return;
      prevForCalcTwek.push(r);
    });
    const seenDates = new Set(prevForCalcTwek.map(r => r.dateISO));
    before.forEach(e => {
      if ((e.isPrev || e.dateISO < fromISO) && !seenDates.has(e.dateISO)) {
        const officialAgents = e.agents.filter(a => a.officiel).map(a => ({ nom: a.nom, matricule: a.matricule }));
        if (officialAgents.length) prevForCalcTwek.push({ dateISO: e.dateISO, agents: officialAgents, obs: e.obs || '' });
        seenDates.add(e.dateISO);
      }
    });
    const cycleSem = buildCycleFromPrevToursSem(prevForCalcTwek, STATE.agents);
    const cycleWE  = buildCycleFromPrevToursWE(prevForCalcTwek, STATE.agents);
    cycleAgents   = cycleSem.length ? cycleSem : agents;
    cycleAgentsWE = cycleWE.length  ? cycleWE  : agents;
    const lastBeforeSem = before.filter(e => !e.isWeekend && e.agents.some(a => a.officiel)).sort((a, b) => b.dateISO.localeCompare(a.dateISO))[0];
    const lastBeforeWE  = before.filter(e =>  e.isWeekend && e.agents.some(a => a.officiel)).sort((a, b) => b.dateISO.localeCompare(a.dateISO))[0];
    const lastSemNom = lastBeforeSem ? (lastBeforeSem.agents.find(a => a.officiel) || {}).nom : null;
    const lastWENom  = lastBeforeWE  ? (lastBeforeWE.agents.find(a => a.officiel)  || {}).nom : null;
    const nextSemAgent = getNextAgentInCycle(cycleAgents, lastSemNom);
    const nextWEAgent  = getNextAgentInCycle(cycleAgentsWE, lastWENom);
    cycleIndexSemaine = nextSemAgent ? cycleAgents.findIndex(a => a.nom === nextSemAgent.nom) : 0;
    cycleIndexWeekend = nextWEAgent  ? cycleAgentsWE.findIndex(a => a.nom === nextWEAgent.nom) : 0;
    if (cycleIndexSemaine < 0) cycleIndexSemaine = 0;
    if (cycleIndexWeekend < 0) cycleIndexWeekend = 0;
    cycleIndex = 0;
  } else {
    cycleAgentsWE = null;
    // New cycle-based approach for SEMTA mode
    cycleAgents = buildCycleFromPrevTours(STATE.prevTours, STATE.agents);
    if (!cycleAgents.length) cycleAgents = agents;
    // Find the last official agent before fromISO to determine cycle position
    const lastBefore = before
      .filter(e => e.agents.some(a => a.officiel))
      .sort((a, b) => b.dateISO.localeCompare(a.dateISO))[0];
    const lastAgentNom = lastBefore ? (lastBefore.agents.find(a => a.officiel) || {}).nom : null;
    const nextAgent = getNextAgentInCycle(cycleAgents, lastAgentNom);
    cycleIndex = nextAgent ? cycleAgents.findIndex(a => a.nom === nextAgent.nom) : 0;
    if (cycleIndex < 0) cycleIndex = 0;
    cycleIndexSemaine = 0;
    cycleIndexWeekend = 0;
    console.log('[Cycle] rebuildFrom ' + fromISO + ': dernier=' + lastAgentNom + ', prochain=' + (nextAgent ? nextAgent.nom : '?') + ' (index ' + cycleIndex + ')');
  }

  const future = generatePlanning(fromISO, 365, {
    mode, cycleIndex, cycleIndexSemaine, cycleIndexWeekend
  }, cycleAgents, cycleAgentsWE);

  STATE.planning = [...before, ...future];
  applyForcedReturns();
  syncPastPlanningToPrevTours();
  STATE.settings.nextGenDate = fromISO;
  saveState();
}

// Get planning entry for a date
function getPlanEntry(dateISO) {
  return STATE.planning.find(e => e.dateISO === dateISO);
}

// Get next N agents in rotation from current position
function getNextInRotation(n) {
  const mode = STATE.settings.mode;
  let agents;
  if (mode === 'SEMTA') {
    agents = buildCycleFromPrevTours(STATE.prevTours, STATE.agents);
    if (!agents.length) agents = getActiveSorted();
  } else if (mode === 'TWEK') {
    agents = buildCycleFromPrevToursSem(STATE.prevTours, STATE.agents);
    if (!agents.length) agents = getActiveSorted();
  } else {
    agents = getActiveSorted();
  }
  if (!agents.length) return [];

  // Determine starting index from first upcoming planning entry
  let idx = 0;
  const future = STATE.planning.filter(e => !e.isPrev && e.dateISO >= todayISO()).sort((a,b) => a.dateISO.localeCompare(b.dateISO));
  if (future.length > 0) {
    const lastAgent = future[0].agents.find(a => a.officiel);
    if (lastAgent) {
      const ai = agents.findIndex(a => a.nom === lastAgent.nom);
      if (ai >= 0) idx = (ai + 1) % agents.length;
    }
  }

  const result = [];
  for (let i = 0; i < n; i++) {
    result.push(agents[(idx + i) % agents.length]);
  }
  return result;
}

// Agent stats
function calcAgentStats() {
  const stats = {};
  STATE.agents.forEach(a => {
    stats[a.nom] = { nom: a.nom, matricule: a.matricule, total: 0, semaine: 0, weekend: 0, doubles: 0, replacements: 0, lastPerm: null, nextPerm: null, lastSemaine: null, lastWeekend: null, nextSemaine: null, nextWeekend: null };
  });
  const today = todayISO();
  STATE.planning.forEach(entry => {
    entry.agents.forEach(a => {
      if (!a.officiel && !a.remplacePar) return; // skip unofficial non-replacements tracking
      const key = a.nom;
      if (!stats[key]) stats[key] = { nom: a.nom, matricule: 0, total:0, semaine:0, weekend:0, doubles:0, replacements:0, lastPerm:null, nextPerm:null, lastSemaine:null, lastWeekend:null, nextSemaine:null, nextWeekend:null };
      if (a.officiel) {
        stats[key].total++;
        if (entry.isWeekend) stats[key].weekend++;
        else stats[key].semaine++;
        if (entry.agents.filter(x => x.officiel).length > 1) stats[key].doubles++;
        if (entry.dateISO <= today) {
          if (!stats[key].lastPerm || entry.dateISO > stats[key].lastPerm) stats[key].lastPerm = entry.dateISO;
          if (!entry.isWeekend) {
            if (!stats[key].lastSemaine || entry.dateISO > stats[key].lastSemaine) stats[key].lastSemaine = entry.dateISO;
          } else {
            if (!stats[key].lastWeekend || entry.dateISO > stats[key].lastWeekend) stats[key].lastWeekend = entry.dateISO;
          }
        } else {
          if (!stats[key].nextPerm || entry.dateISO < stats[key].nextPerm) stats[key].nextPerm = entry.dateISO;
          if (!entry.isWeekend) {
            if (!stats[key].nextSemaine || entry.dateISO < stats[key].nextSemaine) stats[key].nextSemaine = entry.dateISO;
          } else {
            if (!stats[key].nextWeekend || entry.dateISO < stats[key].nextWeekend) stats[key].nextWeekend = entry.dateISO;
          }
        }
      } else if (a.remplacePar) {
        // Count as replacement for remplacePar
        if (!stats[a.remplacePar]) stats[a.remplacePar] = { nom:a.remplacePar, matricule:0, total:0, semaine:0, weekend:0, doubles:0, replacements:0, lastPerm:null, nextPerm:null };
        stats[a.remplacePar].replacements++;
      }
    });
  });
  return stats;
}

function renderTab1Sidebar() {
  const sidebar = document.getElementById('appSidebar');
  if (!sidebar) return;
  const today = todayISO();
  const agents = getActiveSorted();
  const recupMap = getRecupSet(STATE.planning.filter(e => e.dateISO >= addDays(today,-5) && e.dateISO <= addDays(today,5)));

  // Next in rotation
  let nextHTML = '<div class="sidebar-card"><div class="sidebar-card-header">🔄 ' + t('nextRotation') + '</div><div class="sidebar-card-body">';
  const nextAgents = getNextInRotation(5);
  nextAgents.forEach((a, i) => {
    nextHTML += '<div class="sidebar-item">' + renderAvatar(a, 'sm');
    nextHTML += '<div class="sidebar-item-info"><div class="sidebar-item-name">' + (i+1) + '. ' + a.nom + '</div>';
    nextHTML += '<div class="sidebar-item-sub">' + a.matricule + '</div></div></div>';
  });
  nextHTML += '</div></div>';

  // On leave
  let leaveHTML = '<div class="sidebar-card"><div class="sidebar-card-header">🏖️ ' + t('onLeave') + '</div><div class="sidebar-card-body">';
  const onLeaveNow = STATE.repos.filter(r => r.debut <= today && r.fin >= today);
  if (onLeaveNow.length) {
    onLeaveNow.forEach(r => {
      const ag = getAgentByName(r.agent);
      leaveHTML += '<div class="sidebar-item">' + renderAvatar(ag, 'sm');
      leaveHTML += '<div class="sidebar-item-info"><div class="sidebar-item-name">' + r.agent + '</div>';
      leaveHTML += '<div class="sidebar-item-sub">' + r.type + ' — jusqu\'au ' + formatDate(r.fin) + '</div></div></div>';
    });
  } else {
    leaveHTML += '<div class="text-muted" style="padding:.5rem;font-size:.82rem">Aucun agent en absence</div>';
  }
  leaveHTML += '</div></div>';

  // Alerts
  let alertsHTML = '<div class="sidebar-card"><div class="sidebar-card-header">⚠️ ' + t('alerts') + '</div><div class="sidebar-card-body">';
  const threshold = STATE.settings.alertThresholdDays || 30;
  const stats = calcAgentStats();
  let hasAlert = false;
  Object.values(stats).forEach(s => {
    if (!s.lastPerm) return;
    const days = diffDays(s.lastPerm, today);
    if (days > threshold) {
      alertsHTML += '<div class="alert-item warn">⚠️ ' + s.nom + ': ' + days + ' ' + t('daysWithoutPerm') + '</div>';
      hasAlert = true;
    }
  });
  // Coming leaves next week
  const nextWeek = addDays(today, 7);
  const upcomingLeaves = STATE.repos.filter(r => r.debut > today && r.debut <= nextWeek);
  upcomingLeaves.forEach(r => {
    alertsHTML += '<div class="alert-item info">📅 ' + r.agent + ' en ' + r.type + ' le ' + formatDate(r.debut) + '</div>';
    hasAlert = true;
  });

  alertsHTML += '</div></div>';

  sidebar.innerHTML = nextHTML + leaveHTML + alertsHTML;
}

function openModifyDay(dateISO) {
  if (!isAdmin()) { showToast('Accès refusé', 'error'); return; }

  let html = '<div class="form-group"><label>Date</label><input class="form-control" value="' + formatDate(dateISO) + '" readonly></div>';

function confirmModifyDay(dateISO) {
  const motif = document.getElementById('modMotif').value.trim();
  if (!motif) { showToast('Motif obligatoire', 'error'); return; }

  const checked = document.querySelectorAll('input[name=modAgent]:checked');
  const selectedAgents = Array.from(checked).map(c => c.value);
  if (!selectedAgents.length) { showToast('Sélectionnez au moins un agent', 'error'); return; }

  const obs = document.getElementById('modObs').value;
  const entry = getPlanEntry(dateISO);
  const oldVal = entry ? JSON.stringify(entry.agents) : 'N/A';

  const agentObjs = selectedAgents.map(nom => {
    const ag = getAgentByName(nom);
    return { nom, matricule: ag ? ag.matricule : 0, officiel: true, remplacePar: null, motifEchange: '' };
  });

  if (entry) {
    const old = { agents: JSON.parse(JSON.stringify(entry.agents)), obs: entry.obs };
    entry.agents = agentObjs;
    entry.obs = obs;
    entry.modified = true;
    entry.modifiedBy = STATE.currentUser.login;
    entry.modifMotif = motif;
    entry.modifDate = formatDateTime(new Date());
    addLog('modification', dateISO, old, { agents: agentObjs, obs }, motif);
  } else {
    // New entry
    const dow = dowOf(dateISO);
    const newEntry = {
      dateISO, date: formatDate(dateISO), jour: JOURS_FR[dow], jourAr: JOURS_AR[dow], dow,
      agents: agentObjs, obs, isWeekend: isWeekend(dateISO),
      isPrev: false, modified: true, modifiedBy: STATE.currentUser.login,
      modifMotif: motif, modifDate: formatDateTime(new Date())
    };
    STATE.planning.push(newEntry);
    STATE.planning.sort((a,b) => a.dateISO.localeCompare(b.dateISO));
    addLog('modification', dateISO, {}, { agents: agentObjs, obs }, motif);
  }

  saveState();
  closeModal();
  showToast('Modification enregistrée', 'success');
  renderCurrentTab();
}

function renderTab2() {
  const ca = document.getElementById('contentArea');
  const agents = getActiveSorted();

  let html = '<div class="section-title"><span class="icon">📋</span>' + t('tab2') + '</div>';

  // Period selection
  const today = todayISO();
  const defaultStart = addDays(today, -30);
  html += '<div class="card mb-2"><div class="card-body">';
  html += '<div class="form-row">';
  html += '<div class="form-group"><label>' + t('periodFrom') + '</label><input type="date" class="form-control" id="prevStart" value="' + defaultStart + '"></div>';
  html += '<div class="form-group"><label>' + t('periodTo') + '</label><input type="date" class="form-control" id="prevEnd" value="' + today + '"></div>';
  html += '</div>';
  html += '<div class="flex flex-gap">';
  html += '<button class="btn btn-primary" onclick="createPrevGrid()">' + t('createGrid') + '</button>';
  if (STATE.prevTours.length > 0) html += '<button class="btn btn-outline" onclick="loadExistingPrevTours()">📂 Charger existant</button>';
  if (isAdmin() && STATE.prevTours.length > 0) html += '<button class="btn btn-success" onclick="validateAndGenerate()">✅ ' + t('validateGen') + '</button>';
  html += '</div>';
  html += '</div></div>';

  // Grid (if exists)
  if (_prevToursPage.rows.length > 0) {
    html += renderPrevToursGrid();
  } else if (STATE.prevTours.length > 0) {
    html += '<div class="alert-item info" style="margin-top:.5rem">📋 ' + STATE.prevTours.length + ' jours précédents enregistrés. Cliquez "Charger existant" pour modifier.</div>';
  }

  // Result banner if planning exists
  if (STATE.planning.length > 0) {
    const firstFuture = STATE.planning.filter(e => !e.isPrev).sort((a,b) => a.dateISO.localeCompare(b.dateISO))[0];
    if (firstFuture) {
      const ag = firstFuture.agents.find(a => a.officiel);
      html += '<div class="result-banner mt-2">';
      html += '<h3>🎯 ' + t('nextPerm') + ': <strong>' + (ag ? ag.nom : '—') + '</strong> (' + (ag ? ag.matricule : '') + ') — ' + t('startingFrom') + ' ' + firstFuture.date + '</h3>';

      // Build base agents list
      let baseAgents, baseAgentsWE;
      if (STATE.settings.mode === 'SEMTA') {
        const _rCycle = buildCycleFromPrevTours(STATE.prevTours, STATE.agents);
        baseAgents = baseAgentsWE = (_rCycle && _rCycle.length ? _rCycle : getActiveSorted());
      } else if (STATE.settings.mode === 'TWEK') {
        const _cycleSem = buildCycleFromPrevToursSem(STATE.prevTours, STATE.agents);
        const _cycleWE  = buildCycleFromPrevToursWE(STATE.prevTours, STATE.agents);
        baseAgents   = _cycleSem.length ? _cycleSem : getActiveSorted();
        baseAgentsWE = _cycleWE.length  ? _cycleWE  : getActiveSorted();
      } else {
        baseAgents = baseAgentsWE = getActiveSorted();
      }

      // Find next semaine agent
      const today2 = todayISO();
      const planFuturSem2 = STATE.planning.filter(e => !e.isPrev && !e.isWeekend && e.dateISO >= today2).sort((a,b) => a.dateISO.localeCompare(b.dateISO));
      const planFuturWE2  = STATE.planning.filter(e => !e.isPrev &&  e.isWeekend && e.dateISO >= today2).sort((a,b) => a.dateISO.localeCompare(b.dateISO));
      const nextSemAgent2 = planFuturSem2[0] ? (planFuturSem2[0].agents.find(a => a.officiel) || {}).nom : null;
      const nextWEAgent2  = planFuturWE2[0]  ? (planFuturWE2[0].agents.find(a => a.officiel)  || {}).nom : null;

      // Build rotation order starting from next agent
      function buildRotFrom2(startName, pool) {
        pool = pool || baseAgents;
        if (!pool.length) return pool;
        const idx = pool.findIndex(a => a.nom === startName);
        if (idx < 0) return pool;
        return [...pool.slice(idx), ...pool.slice(0, idx)];
      }

      const orderSem2 = buildRotFrom2(nextSemAgent2);
      const orderWE2  = buildRotFrom2(nextWEAgent2, baseAgentsWE);

      // Render semaine rotation
      html += '<div style="margin-top:.8rem;display:flex;gap:1rem;flex-wrap:wrap">';
      html += '<div style="flex:1;min-width:220px">';
      html += '<p style="font-weight:600;margin-bottom:.4rem">📋 Ordre de rotation du lundi au vendredi :</p>';
      html += '<div class="rotation-list">';
      orderSem2.forEach((a, i) => {
        const isCur = a.nom === nextSemAgent2;
        html += '<span class="rotation-chip' + (isCur ? ' current' : '') + '">' + (i+1) + '. ' + a.nom + '</span>';
      });
      html += '</div></div>';

      // Render week-end rotation
      html += '<div style="flex:1;min-width:220px">';
      html += '<p style="font-weight:600;margin-bottom:.4rem;color:#a8d8f0">📋 Ordre de rotation samedi et dimanche :</p>';
      html += '<div class="rotation-list">';
      orderWE2.forEach((a, i) => {
        const isCur = a.nom === nextWEAgent2;
        html += '<span class="rotation-chip' + (isCur ? ' current' : '') + '">' + (i+1) + '. ' + a.nom + '</span>';
      });
      html += '</div></div>';

      html += '</div>'; // end flex row
      html += '</div>'; // end result-banner
    }
  }

  ca.innerHTML = html;
}

function createPrevGrid() {
  const start = document.getElementById('prevStart').value;
  const end = document.getElementById('prevEnd').value;
  if (!start || !end || start > end) { showToast('Période invalide', 'error'); return; }

  const rows = [];
  let cur = start;
  while (cur <= end) {
    // Find existing prev tour for this date
    const existing = STATE.prevTours.find(r => r.dateISO === cur);
    rows.push({
      dateISO: cur,
      agents: existing ? (existing.agents || []).map(a => a.nom) : [],
      obs: existing ? (existing.obs || '') : ''
    });
    cur = addDays(cur, 1);
  }
  _prevToursPage.start = start;
  _prevToursPage.end = end;
  _prevToursPage.rows = rows;
  renderTab2();
}

function loadExistingPrevTours() {
  if (!STATE.prevTours.length) return;
  const sorted = [...STATE.prevTours].sort((a,b) => a.dateISO.localeCompare(b.dateISO));
  if (sorted.length) {
    _prevToursPage.start = sorted[0].dateISO;
    _prevToursPage.end = sorted[sorted.length-1].dateISO;
    _prevToursPage.rows = sorted.map(r => ({ dateISO: r.dateISO, agents: (r.agents || []).map(a => a.nom), obs: r.obs || '' }));
    renderTab2();
  }
}

function renderPrevToursGrid() {
  const agents = getActiveSorted();
  const rows = _prevToursPage.rows;
  const counters = {};
  agents.forEach(a => { counters[a.nom] = 0; });
  rows.forEach(r => { (r.agents || []).forEach(nom => { if (nom && counters[nom] !== undefined) counters[nom]++; }); });

  let html = '<div class="card"><div class="card-header"><span class="card-title">Grille des tours précédents (' + rows.length + ' jours)</span>';
  if (isAdmin()) {
    html += '<div class="flex flex-gap">';
    html += '<button class="btn btn-sm btn-outline" onclick="autoFillPrevTours()">🤖 ' + t('autoEntry') + '</button>';
    html += '<button class="btn btn-sm btn-success" onclick="validateAndGenerate()">✅ ' + t('validateGen') + '</button>';
    html += '</div>';
  }
  html += '</div><div class="card-body" style="padding:0">';
  html += '<div class="table-container"><table class="prev-tours-table"><thead><tr>';
  html += '<th>#</th><th>Date</th><th>Jour</th><th>Agent(s)</th><th>Observation</th>';
  if (isAdmin()) html += '<th>✕</th>';
  html += '</tr></thead><tbody id="prevToursBody">';

  rows.forEach((row, idx) => {
    const dow = dowOf(row.dateISO);
    const isWE = isWeekend(row.dateISO);
    const rowAgents = row.agents || [];
    html += '<tr class="' + (isWE ? 'weekend-row' : '') + '" id="prevRow_' + idx + '">';
    html += '<td>' + (idx+1) + '</td>';
    html += '<td><strong>' + formatDate(row.dateISO) + '</strong></td>';
    html += '<td>' + JOURS_FR[dow] + '</td>';
    html += '<td>';
    // Display current agents as badges
    html += '<div class="prev-agent-badges">';
    rowAgents.forEach((nom, agentIdx) => {
      if (!nom) return;
      if (isAdmin()) {
        html += '<span class="prev-agent-badge">' + escHtml(nom) + '<span class="remove-badge" onclick="removePrevRowAgent(' + idx + ',' + agentIdx + ')">×</span></span>';
      } else {
        html += '<span class="prev-agent-badge">' + escHtml(nom) + '</span>';
      }
    });
    if (isAdmin()) {
      html += '<button class="btn btn-sm btn-outline" style="padding:.15rem .5rem;font-size:.75rem" onclick="openQuickEntry(' + idx + ',\'' + row.dateISO + '\')">⚡ ' + (rowAgents.length ? 'Modifier' : 'Ajouter') + '</button>';
    }
    html += '</div>';
    html += '</td>';
    html += '<td><input class="form-control" style="padding:.3rem" placeholder="Observation..." value="' + (row.obs||'') + '" oninput="setPrevObs('+idx+',this.value)"' + (isAdmin() ? '' : ' disabled') + '></td>';
    if (isAdmin()) {
      html += '<td><button class="btn btn-sm btn-danger" onclick="clearPrevRow(' + idx + ')">✕</button></td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Mini-counters
  html += '<div class="mini-counters" style="padding:.7rem">';
  agents.forEach(a => {
    html += '<div class="mini-counter">' + a.nom + ': <span class="cnt">' + (counters[a.nom]||0) + '</span></div>';
  });
  html += '</div>';
  html += '</div></div>';
  return html;
}

function setPrevAgent(idx, val) {
  if (_prevToursPage.rows[idx] !== undefined) {
    // Legacy: set single agent (used by autoFill)
    _prevToursPage.rows[idx].agents = val ? [val] : [];
  }
}
function removePrevRowAgent(rowIdx, agentIdx) {
  const row = _prevToursPage.rows[rowIdx];
  if (row && row.agents) {
    row.agents.splice(agentIdx, 1);
    renderTab2();
  }
}
function setPrevObs(idx, val) {
  if (_prevToursPage.rows[idx] !== undefined) {
    _prevToursPage.rows[idx].obs = val;
  }
}
function clearPrevRow(idx) {
  if (_prevToursPage.rows[idx] !== undefined) {
    _prevToursPage.rows[idx].agents = [];
    _prevToursPage.rows[idx].obs = '';
    renderTab2();
  }
}

function autoFillPrevTours() {
  const agents = getActiveSorted();
  if (!agents.length) return;
  let idx = 0;
  _prevToursPage.rows.forEach(row => {
    if (!row.agents || !row.agents.length) {
      row.agents = [agents[idx % agents.length].nom];
    }
    idx++;
  });
  renderTab2();
}

function openQuickEntry(rowIdx, dateISO) {
  _quickEntryDate = dateISO;
  _quickEntryRow = rowIdx;

function toggleQuickAgent(btn) {
  btn.classList.toggle('selected');

function confirmQuickEntry() {
  const selected = document.querySelectorAll('#quickModalBody .quick-agent-btn.selected');

function validateAndGenerate() {
  if (!isAdmin()) { showToast('Accès refusé', 'error'); return; }
  const rows = _prevToursPage.rows.length > 0 ? _prevToursPage.rows : null;

  // Collect prev tours from grid — produce new format [{dateISO, agents:[{nom,matricule,officiel}], obs}]
  let prevToursData = [];
  if (rows) {
    rows.forEach(r => {
      if (!r.dateISO || !r.agents || !r.agents.length) return;
      const agentObjs = r.agents.map(nom => {
        const ag = getAgentByName(nom.trim());
        return ag ? { nom: ag.nom, matricule: ag.matricule, officiel: true } : null;
      }).filter(Boolean);
      if (agentObjs.length) {
        prevToursData.push({ dateISO: r.dateISO, agents: agentObjs, obs: r.obs || '' });
      }
    });
  } else if (STATE.prevTours.length) {
    prevToursData = STATE.prevTours;
  }

  if (!prevToursData.length) { showToast('Aucune donnée à valider', 'error'); return; }

  STATE.prevTours = prevToursData;
  const fullPlan = buildFullPlanning(prevToursData, STATE.agents, STATE.settings.mode);
  STATE.planning = fullPlan;
  applyForcedReturns();
  syncPastPlanningToPrevTours();

  // Update cycle indices in settings
  const agents = getActiveSorted();
  const { cycleIndex, cycleIndexSemaine, cycleIndexWeekend, nextStartISO } = calcCycleFromPrev(prevToursData, agents, STATE.settings.mode);
  STATE.settings.cycleIndex = cycleIndex;
  STATE.settings.cycleIndexSemaine = cycleIndexSemaine;
  STATE.settings.cycleIndexWeekend = cycleIndexWeekend;
  STATE.settings.nextGenDate = nextStartISO;

  addLog('modification', 'GLOBAL', {}, { action: 'generate', prevCount: prevToursData.length, planCount: fullPlan.length }, 'Génération planning annuel');
  saveState();
  showToast(t('genSuccess') + ' (' + fullPlan.length + ' jours)', 'success');
  _prevToursPage.rows = [];
  switchTab(1);
}

  html += '<button class="btn btn-sm ' + (_calView==='week' ? 'btn-primary' : 'btn-outline') + '" onclick="setCalView(\'week\')">📆 Semaine</button>';

  html += '<div class="filter-group"><label>Agent:</label><select onchange="_planningFilter.agent=this.value;renderTab3()" style="padding:.3rem .5rem;border:1.5px solid var(--border-color);border-radius:6px;background:var(--bg-primary);color:var(--text-primary)">';
  html += '<option value="">Tous</option>';
  getActiveSorted().forEach(a => {
    html += '<option value="' + a.nom + '"' + (_planningFilter.agent===a.nom?' selected':'') + '>' + a.nom + '</option>';
  });
  html += '</select></div>';
  html += '<div class="filter-group"><label>Type:</label><select onchange="_planningFilter.type=this.value;renderTab3()" style="padding:.3rem .5rem;border:1.5px solid var(--border-color);border-radius:6px;background:var(--bg-primary);color:var(--text-primary)">';
  html += '<option value="">Tous</option><option value="semaine"' + (_planningFilter.type==='semaine'?' selected':'') + '>Semaine</option><option value="weekend"' + (_planningFilter.type==='weekend'?' selected':'') + '>Week-end</option><option value="double"' + (_planningFilter.type==='double'?' selected':'') + '>Double</option><option value="prev"' + (_planningFilter.type==='prev'?' selected':'') + '>Précédent</option>';

  else if (_calView === 'month') html += renderCalMonth();
