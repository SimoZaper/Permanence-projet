function setCalView(v) { _calView = v; renderTab3(); }

function getFilteredPlan() {
  let entries = STATE.planning.slice();
  if (_calMonth) entries = entries.filter(e => e.dateISO.startsWith(_calMonth));
  if (_planningFilter.agent) entries = entries.filter(e => e.agents.some(a => a.nom === _planningFilter.agent));
  if (_planningFilter.type === 'semaine') entries = entries.filter(e => !e.isWeekend);
  if (_planningFilter.type === 'weekend') entries = entries.filter(e => e.isWeekend);
  if (_planningFilter.type === 'double') entries = entries.filter(e => e.agents.filter(a=>a.officiel).length > 1);
  if (_planningFilter.type === 'prev') entries = entries.filter(e => e.isPrev);
  return entries.sort((a,b) => a.dateISO.localeCompare(b.dateISO));
}

function renderPlanList() {
  const entries = getFilteredPlan();
  const today = todayISO();
  let html = '<div class="table-container"><table><thead><tr>';
  html += '<th>#</th><th>Date</th><th>Jour</th><th>Agent(s)</th><th>Mat.</th><th>Type</th><th>Récup.</th><th>Obs.</th>';
  if (isAdmin()) html += '<th>Actions</th>';
  html += '</tr></thead><tbody>';
  if (!entries.length) {
    html += '<tr><td colspan="9" class="empty-state"><div class="icon">📅</div><p>' + t('noData') + '</p></td></tr>';
  }
  entries.forEach((e,i) => {
    const cls = e.dateISO===today ? 'today-row' : (e.isWeekend ? 'weekend-row' : (e.isPrev ? 'prev-row' : ''));
    const agList = e.agents.filter(a=>a.officiel);
    const agNames = agList.map(a => a.remplacePar ? '<span class="text-danger">' + a.remplacePar + '</span><small>(→' + a.nom + ')</small>' : a.nom).join(', ');
    const mats = agList.map(a => { const ag=getAgentByName(a.nom); return ag ? ag.matricule : ''; }).join(', ');
    const recupDate = !e.isPrev ? formatDate(getRecupISO(e.dateISO)) : '—';
    const typeStr = e.isPrev ? '<span class="badge badge-prev">Préc.</span>' : (e.isWeekend ? '<span class="badge badge-we">WE</span>' : '<span class="badge badge-success">Sem.</span>');
    html += '<tr class="' + cls + '">';
    html += '<td>' + (i+1) + '</td><td>' + e.date + '</td><td>' + e.jour + '</td><td>' + agNames + '</td><td>' + mats + '</td><td>' + typeStr + '</td><td>' + (e.isPrev ? '—' : '<span class="badge badge-recup">' + recupDate + '</span>') + '</td><td>' + (e.obs||'') + '</td>';
    if (isAdmin()) html += '<td><button class="btn btn-sm btn-outline" onclick="openModifyDay(\'' + e.dateISO + '\')">✏️</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderCalMonth() {
  const [y,m] = _calMonth.split('-').map(Number);
  const firstDay = new Date(y, m-1, 1);
  const lastDay = new Date(y, m, 0);
  const startDow = firstDay.getDay();

  let html = '<div class="flex items-center justify-between mb-2">';
  const prevM = m===1 ? (y-1)+'-12' : y+'-'+String(m-1).padStart(2,'0');
  const nextM = m===12 ? (y+1)+'-01' : y+'-'+String(m+1).padStart(2,'0');
  html += '<button class="btn btn-sm btn-outline" onclick="_calMonth=\'' + prevM + '\';renderTab3()">◀</button>';
  html += '<h3>' + MOIS_FR[m-1] + ' ' + y + '</h3>';
  html += '<button class="btn btn-sm btn-outline" onclick="_calMonth=\'' + nextM + '\';renderTab3()">▶</button>';
  html += '</div>';

  html += '<div class="calendar-grid">';
  JOURS_FR.forEach(j => { html += '<div class="cal-header">' + j.substring(0,3) + '</div>'; });

  // Empty cells before first day
  for (let i=0; i<startDow; i++) html += '<div class="cal-cell other-month"></div>';

  const today = todayISO();
  for (let d=1; d<=lastDay.getDate(); d++) {
    const dateISO = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const entry = getPlanEntry(dateISO);
    const cls = ['cal-cell'];
    if (dateISO===today) cls.push('today');
    else if (isWeekend(dateISO)) cls.push('weekend');
    if (entry && entry.isPrev) cls.push('prev');

    html += '<div class="' + cls.join(' ') + '" onclick="showDayDetail(\'' + dateISO + '\')">';
    html += '<div class="cal-date">' + d + '</div>';
    if (entry) {
      entry.agents.filter(a=>a.officiel).forEach(a => {
        html += '<div class="cal-agent">' + (a.remplacePar||a.nom) + '</div>';
      });
    }
    html += '</div>';
  }
  // Fill remaining cells
  const totalCells = startDow + lastDay.getDate();
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i=0; i<remaining; i++) html += '<div class="cal-cell other-month"></div>';

  html += '</div>';
  return html;
}

function getWeekStart(iso) {
  const d = fromISO(iso);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  return toISO(d);
}

function renderCalWeek() {
  const weekStart = _calWeekStart || getWeekStart(todayISO());
  const weekEnd = addDays(weekStart, 6);
  const prevWeek = addDays(weekStart, -7);
  const nextWeek = addDays(weekStart, 7);
  const today = todayISO();

  let html = '<div class="flex items-center justify-between mb-2">';
  html += '<button class="btn btn-sm btn-outline" onclick="_calWeekStart=\'' + prevWeek + '\';renderTab3()">◀ Semaine préc.</button>';
  html += '<span>' + formatDate(weekStart) + ' — ' + formatDate(weekEnd) + '</span>';
  html += '<button class="btn btn-sm btn-outline" onclick="_calWeekStart=\'' + nextWeek + '\';renderTab3()">Semaine suiv. ▶</button>';
  html += '</div><div class="week-view">';

  for (let i=0; i<7; i++) {
    const dateISO = addDays(weekStart, i);
    const dow = dowOf(dateISO);
    const entry = getPlanEntry(dateISO);
    const isToday = dateISO === today;
    const isWE = isWeekend(dateISO);
    const headerCls = isToday ? 'week-day-header today-header' : (isWE ? 'week-day-header weekend-header' : 'week-day-header');

    html += '<div class="week-day-col" onclick="showDayDetail(\'' + dateISO + '\')">';
    html += '<div class="' + headerCls + '">' + JOURS_FR[dow] + '<br><small>' + formatDate(dateISO) + '</small></div>';
    html += '<div class="week-day-body">';
    if (entry) {
      entry.agents.filter(a=>a.officiel).forEach(a => {
        const ag = getAgentByName(a.nom);
        html += renderAvatar(ag, 'sm');
        html += '<div style="font-size:.78rem;font-weight:700;margin:.2rem 0">' + (a.remplacePar||a.nom) + '</div>';
        html += '<div style="font-size:.7rem;color:var(--text-secondary)">' + (ag ? ag.matricule : '') + '</div>';
      });
    } else {
      html += '<div class="text-muted" style="font-size:.78rem">—</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';

  // Rotation orders block
  html += '<div style="margin-top:1rem;display:flex;gap:1rem;flex-wrap:wrap">';

  const _cycle = STATE.settings.mode !== 'TWEK' ? buildCycleFromPrevTours(STATE.prevTours, STATE.agents) : null;
  let agents, agentsWE;
  if (STATE.settings.mode === 'SEMTA') {
    agents = agentsWE = (_cycle && _cycle.length ? _cycle : getActiveSorted());
  } else if (STATE.settings.mode === 'TWEK') {
    const _cycleSem = buildCycleFromPrevToursSem(STATE.prevTours, STATE.agents);
    const _cycleWE  = buildCycleFromPrevToursWE(STATE.prevTours, STATE.agents);
    agents   = _cycleSem.length ? _cycleSem : getActiveSorted();
    agentsWE = _cycleWE.length  ? _cycleWE  : getActiveSorted();
  } else {
    agents = agentsWE = getActiveSorted();
  }
  const today2 = todayISO();
  const planFuturSem = STATE.planning.filter(e => !e.isPrev && !e.isWeekend && e.dateISO >= today2).sort((a,b)=>a.dateISO.localeCompare(b.dateISO));
  const planFuturWE  = STATE.planning.filter(e => !e.isPrev &&  e.isWeekend && e.dateISO >= today2).sort((a,b)=>a.dateISO.localeCompare(b.dateISO));

  // Find next agent for semaine
  const nextSemEntry = planFuturSem[0];
  const nextSemAgent = nextSemEntry ? (nextSemEntry.agents.find(a=>a.officiel)||{}).nom : null;
  // Find next agent for weekend
  const nextWEEntry  = planFuturWE[0];
  const nextWEAgent  = nextWEEntry  ? (nextWEEntry.agents.find(a=>a.officiel)||{}).nom  : null;

  // Build rotation order starting from next agent
  function buildRotationFrom(startName, pool) {
    pool = pool || agents;
    if (!pool.length) return pool;
    const idx = pool.findIndex(a => a.nom === startName);
    if (idx < 0) return pool;
    return [...pool.slice(idx), ...pool.slice(0, idx)];
  }

  const orderSem = buildRotationFrom(nextSemAgent);
  const orderWE  = buildRotationFrom(nextWEAgent, agentsWE);

  // Render Semaine rotation
  html += '<div class="card" style="flex:1;min-width:220px"><div class="card-body">';
  html += '<h4 style="margin-bottom:.5rem;color:var(--primary)">📋 Ordre rotation — Semaine</h4>';
  html += '<div class="rotation-list">';
  orderSem.forEach((a, i) => {
    const isCur = a.nom === nextSemAgent;
    html += '<span class="rotation-chip' + (isCur ? ' current' : '') + '">' + (i+1) + '. ' + a.nom + '</span>';
  });
  html += '</div></div></div>';

  // Render Week-end rotation
  html += '<div class="card" style="flex:1;min-width:220px"><div class="card-body">';
  html += '<h4 style="margin-bottom:.5rem;color:#3498db">📋 Ordre rotation — Week-end</h4>';
  html += '<div class="rotation-list">';
  orderWE.forEach((a, i) => {
    const isCur = a.nom === nextWEAgent;
    html += '<span class="rotation-chip' + (isCur ? ' current' : '') + '">' + (i+1) + '. ' + a.nom + '</span>';
  });
  html += '</div></div></div>';

  html += '</div>'; // end flex row

  return html;
}

    html += '<div class="agent-stat"><div class="n">' + (s.weekend||0) + '</div><div class="l">WE</div></div>';

    html += '<span style="color:#e67e22">Proch-W: </span><strong>' + (s.nextWeekend ? formatDate(s.nextWeekend) : '—') + '</strong>';

function openAddAgent() {
  const html = '<div class="form-row">' +
    '<div class="form-group"><label>Nom <span class="text-danger">*</span></label><input class="form-control" id="agNom" placeholder="Nom de famille"></div>' +
    '<div class="form-group"><label>Matricule <span class="text-danger">*</span></label><input class="form-control" type="number" id="agMat" placeholder="ex: 80000"></div>' +
    '</div>' +
    '<div class="form-group"><label>' + t('photoPicker') + '</label><input type="file" accept="image/*" id="agPhoto" class="form-control" onchange="previewAgentPhoto(this)"></div>' +
    '<div id="photoPreview" style="margin:.5rem 0"></div>' +
    '<div class="form-group"><label class="form-check"><input type="checkbox" id="agActif" checked> Actif</label></div>';
  openModal('+ Ajouter un Agent', html,
    '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveAgent(0)">Enregistrer</button>');
}

function openEditAgent(id) {
  const a = STATE.agents.find(x => x.id === id);
  if (!a) return;
  const html = '<div class="form-row">' +
    '<div class="form-group"><label>Nom</label><input class="form-control" id="agNom" value="' + a.nom + '"></div>' +
    '<div class="form-group"><label>Matricule</label><input class="form-control" type="number" id="agMat" value="' + a.matricule + '"></div>' +
    '</div>' +
    '<div class="form-group"><label>Photo</label><input type="file" accept="image/*" id="agPhoto" class="form-control" onchange="previewAgentPhoto(this)"></div>' +
    '<div id="photoPreview" style="margin:.5rem 0">' + (a.photo ? '<img src="'+a.photo+'" style="width:60px;height:60px;border-radius:50%;object-fit:cover">' : '') + '</div>' +
    '<div class="form-group"><label class="form-check"><input type="checkbox" id="agActif"' + (a.actif?' checked':'') + '> Actif</label></div>';
  openModal('✏️ Modifier ' + a.nom, html,
    '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveAgent(' + id + ')">Enregistrer</button>');
}

function previewAgentPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('photoPreview');
    if (prev) prev.innerHTML = '<img src="' + e.target.result + '" style="width:60px;height:60px;border-radius:50%;object-fit:cover">';
    input.dataset.photoData = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveAgent(id) {
  const nom = document.getElementById('agNom').value.trim();
  const mat = parseInt(document.getElementById('agMat').value);
  const actif = document.getElementById('agActif').checked;
  const photoInput = document.getElementById('agPhoto');
  const photo = photoInput && photoInput.dataset.photoData ? photoInput.dataset.photoData : null;

  if (!nom || !mat) { showToast('Nom et matricule obligatoires', 'error'); return; }

  if (id === 0) {
    const newId = nextId(STATE.agents);
    const existing = STATE.agents.find(a => a.nom === nom);
    if (existing) { showToast('Cet agent existe déjà', 'error'); return; }
    STATE.agents.push({ id: newId, nom, matricule: mat, actif, photo: photo || null });
    addLog('modification', 'AGENTS', {}, { action:'add', nom, matricule:mat }, 'Ajout agent');
  } else {
    const a = STATE.agents.find(x => x.id === id);
    if (!a) return;
    const old = { nom: a.nom, matricule: a.matricule, actif: a.actif };
    a.nom = nom; a.matricule = mat; a.actif = actif;
    if (photo) a.photo = photo;
    addLog('modification', 'AGENTS', old, { nom, matricule:mat, actif }, 'Modification agent');
  }
  saveState();
  closeModal();
  showToast('Agent enregistré', 'success');
  renderTab4();
}

function toggleAgentActive(id) {
  const a = STATE.agents.find(x => x.id === id);
  if (!a) return;
  a.actif = !a.actif;
  addLog('modification', 'AGENTS', { actif: !a.actif }, { actif: a.actif }, (a.actif ? 'Activation' : 'Désactivation') + ' agent ' + a.nom);
  saveState();
  showToast(a.nom + ' : ' + (a.actif ? 'activé' : 'désactivé'), 'success');
  renderTab4();
}

function deleteAgent(id) {
  const a = STATE.agents.find(x => x.id === id);
  if (!a) return;
  const inPlan = STATE.planning.some(e => e.agents.some(ag => ag.nom === a.nom));
  if (inPlan) { showToast('Impossible: cet agent est dans le planning', 'error'); return; }
  if (!confirm('Supprimer ' + a.nom + ' ?')) return;
  STATE.agents = STATE.agents.filter(x => x.id !== id);
  addLog('modification', 'AGENTS', { nom: a.nom }, {}, 'Suppression agent');
  saveState();
  showToast('Agent supprimé', 'success');
  renderTab4();
}

    if (r.fin < today) { statusBadge = '⚫ Passé'; statusClass = 'badge-info'; }

    else { statusBadge = '🔴 En cours'; statusClass = 'badge-danger'; }

    const typeBadge = r.type === 'congé' ? 'badge-conge' : (r.type === 'maladie' ? 'badge-maladie' : 'badge-mission');
    tableHTML += '<tr>';
    tableHTML += '<td>' + (i+1) + '</td>';
    tableHTML += '<td><strong>' + r.agent + '</strong></td>';
    tableHTML += '<td><span class="badge ' + typeBadge + '">' + r.type + '</span></td>';
    tableHTML += '<td>' + formatDate(r.debut) + '</td>';
    tableHTML += '<td>' + formatDate(r.fin) + '</td>';
    tableHTML += '<td>' + dur + ' j.</td>';
    tableHTML += '<td>' + (r.motif||'—') + '</td>';
    tableHTML += '<td><span class="badge ' + statusClass + '">' + statusBadge + '</span></td>';
    tableHTML += '<td>' + (r.saisiPar||'—') + '</td>';
    if (isAdmin()) {
      tableHTML += '<td><div class="table-actions">';
      tableHTML += '<button class="btn btn-sm btn-outline" onclick="openEditRepos(' + r.id + ')">✏️</button>';
      tableHTML += '<button class="btn btn-sm btn-danger" onclick="deleteRepos(' + r.id + ')">🗑️</button>';

function calcDuree() {
  const d = document.getElementById('rDebut').value;
  const f = document.getElementById('rFin').value;
  const el = document.getElementById('rDuree');
  if (d && f && el) el.textContent = (diffDays(d,f)+1) + ' jour(s)';
}

function saveRepos(id) {
  const agent = document.getElementById('rAgent').value;
  const type = document.getElementById('rType').value;
  const debut = document.getElementById('rDebut').value;
  const fin = document.getElementById('rFin').value;
  const motif = document.getElementById('rMotif').value.trim();

  if (!agent || !debut || !fin || !motif) { showToast('Tous les champs obligatoires', 'error'); return; }
  if (debut > fin) { showToast('Date de début après date de fin', 'error'); return; }

  if (id === 0) {
    const newId = nextId(STATE.repos);
    STATE.repos.push({ id: newId, agent, debut, fin, type, motif, saisi: todayISO(), saisiPar: STATE.currentUser.login });
    addLog('repos', debut, {}, { agent, type, debut, fin, motif }, 'Ajout absence ' + type);
  } else {
    const r = STATE.repos.find(x => x.id === id);
    if (!r) return;
    const old = { ...r };
    Object.assign(r, { agent, debut, fin, type, motif });
    addLog('repos', debut, old, { agent, type, debut, fin, motif }, 'Modification absence');
  }

  saveState();
  closeModal();
  showToast('Absence enregistrée. Recalcul recommandé.', 'success');
  renderTab5();
}

function deleteRepos(id) {
  const r = STATE.repos.find(x => x.id === id);
  if (!r) return;
  if (!confirm('Supprimer cette absence ?')) return;
  STATE.repos = STATE.repos.filter(x => x.id !== id);
  addLog('repos', r.debut, r, {}, 'Suppression absence');
  saveState();
  showToast('Absence supprimée', 'success');
  renderTab5();
}

function fillExchangeOfficiel() {
  const dateEl = document.getElementById('exchDate');
  const officielEl = document.getElementById('exchOfficiel');
  if (!dateEl || !officielEl) return;
  const dateISO = dateEl.value;
  const entry = getPlanEntry(dateISO);
  if (entry) {
    const agents = entry.agents.filter(a => a.officiel);
    officielEl.value = agents.map(a => a.nom).join(', ');
  } else {
    officielEl.value = 'Aucun planning pour cette date';
  }
}

function saveEchange() {
  const date = document.getElementById('exchDate').value;
  const officiel = document.getElementById('exchOfficiel').value;
  const remplacant = document.getElementById('exchRemplacant').value;
  const motif = document.getElementById('exchMotif').value.trim();

  if (!date || !remplacant || !motif) { showToast('Tous les champs obligatoires', 'error'); return; }
  if (!officiel || officiel.includes('Aucun')) { showToast('Aucun planning pour cette date', 'error'); return; }
  if (officiel.includes(remplacant)) { showToast('L\'agent remplaçant ne peut pas être l\'agent officiel', 'error'); return; }

  // Update planning entry
  const entry = getPlanEntry(date);
  if (entry) {
    const old = JSON.parse(JSON.stringify(entry.agents));
    entry.agents.forEach(a => {
      if (a.officiel && !a.remplacePar) {
        a.remplacePar = remplacant;
        a.motifEchange = motif;
      }
    });
    addLog('echange', date, { agents: old }, { agents: entry.agents }, motif);
  }

  const newId = nextId(STATE.echanges.map(e => ({ id: typeof e.id === 'number' ? e.id : parseInt(e.id.replace(/\D/g,'')) || 0 })));
  STATE.echanges.push({
    id: newId, date, officiel, remplacant, motif,
    saisiPar: STATE.currentUser.login,
    saisiDate: formatDateTime(new Date())
  });
  saveState();
  showToast('Échange enregistré', 'success');
  renderTab6();
}

function deleteEchange(id) {
  const e = STATE.echanges.find(x => x.id === id);
  if (!e) return;
  if (!confirm('Supprimer cet échange ?')) return;
  // Restore planning entry
  const entry = getPlanEntry(e.date);
  if (entry) {
    entry.agents.forEach(a => {
      if (a.remplacePar === e.remplacant) {
        a.remplacePar = null;
        a.motifEchange = '';
      }
    });
  }
  STATE.echanges = STATE.echanges.filter(x => x.id !== id);
  addLog('echange', e.date, e, {}, 'Suppression échange');
  saveState();
  showToast('Échange supprimé', 'success');
  renderTab6();
}

// TAB 7 — TABLEAU DE BORD
// ════════════════════════════════════════════════════════════
function renderTab7() {
  const ca = document.getElementById('contentArea');
  const stats = calcAgentStats();
  const agents = getActiveSorted();
  const today = todayISO();
  const total = STATE.planning.length;
  const covered = STATE.planning.filter(e => e.agents.length > 0).length;
  const pct = total ? Math.round(covered / total * 100) : 0;
  const totals = agents.map(a => stats[a.nom] ? stats[a.nom].total : 0);
  const maxT = Math.max(...totals, 1);
  const minT = Math.min(...totals.filter(t2 => t2 > 0), maxT);
  const equity = totals.filter(t2 => t2 > 0).length > 1 ? Math.round((1 - (maxT - minT) / maxT) * 100) : 100;

  let html = '<div class="section-title"><span class="icon">📊</span>' + t('tab7') + '</div>';

  // Global stats
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="stat-icon blue">📅</div><div class="stat-info"><div class="n">' + total + '</div><div class="l">' + t('daysPlanned') + '</div></div></div>';
  html += '<div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="n">' + pct + '%</div><div class="l">' + t('coverage') + '</div></div></div>';
  html += '<div class="stat-card"><div class="stat-icon orange">⚖️</div><div class="stat-info"><div class="n">' + equity + '%</div><div class="l">' + t('equityRate') + '</div></div></div>';
  html += '<div class="stat-card"><div class="stat-icon purple">👥</div><div class="stat-info"><div class="n">' + getAvailableToday().length + '</div><div class="l">' + t('activeAgents') + '</div></div></div>';
  html += '</div>';

  // Charts row
  html += '<div class="charts-row">';
  html += '<div class="chart-container"><div class="chart-title">Permanences par agent</div><canvas id="chartBar" height="200"></canvas></div>';
  html += '<div class="chart-container"><div class="chart-title">Répartition Semaine / WE</div><canvas id="chartDonut" height="200"></canvas></div>';
  html += '</div>';

  // Comparison table
  html += '<div class="card"><div class="card-header"><span class="card-title">Tableau comparatif</span></div><div class="card-body" style="padding:0">';
  html += '<div class="table-container"><table><thead><tr>';
  html += '<th>Rang</th><th>' + t('agent') + '</th><th>' + t('matricule') + '</th><th>' + t('total') + '</th><th>' + t('semaine') + '</th><th>' + t('weekend') + '</th><th>' + t('double') + '</th><th>Rempl.</th><th>Dern. perm.</th><th>Proch. perm.</th></tr></thead><tbody>';

  const sorted = agents.map((a,i) => ({ ...a, ...stats[a.nom], rank: i+1 })).sort((a,b) => (b.total||0) - (a.total||0));
  sorted.forEach((s,i) => {
    const pct2 = maxT ? Math.round((s.total||0) / maxT * 100) : 0;
    html += '<tr>';
    html += '<td>' + (i+1) + '</td>';
    html += '<td><strong>' + s.nom + '</strong></td>';
    html += '<td>' + s.matricule + '</td>';
    html += '<td><div>' + (s.total||0) + '</div><div class="progress-bar"><div class="progress-fill" style="width:' + pct2 + '%"></div></div></td>';
    html += '<td>' + (s.semaine||0) + '</td>';
    html += '<td>' + (s.weekend||0) + '</td>';
    html += '<td>' + (s.doubles||0) + '</td>';
    html += '<td>' + (s.replacements||0) + '</td>';
    html += '<td>' + (s.lastPerm ? formatDate(s.lastPerm) : '—') + '</td>';
    html += '<td>' + (s.nextPerm ? formatDate(s.nextPerm) : '—') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div></div>';

  // Alerts
  html += '<div class="card mt-2"><div class="card-header"><span class="card-title">⚠️ Alertes automatiques</span></div><div class="card-body">';
  const threshold = STATE.settings.alertThresholdDays || 30;
  let hasAlert = false;
  agents.forEach(a => {
    const s = stats[a.nom];
    if (!s || !s.lastPerm) return;
    const days = diffDays(s.lastPerm, today);
    if (days > threshold) {
      html += '<div class="alert-item warn">⚠️ <strong>' + a.nom + '</strong>: ' + days + ' jours sans permanence (seuil: ' + threshold + ')</div>';
      hasAlert = true;
    }
  });
  // Most/least loaded
  if (sorted.length > 1) {
    const most = sorted[0];
    const least = sorted[sorted.length-1];
    if (most.total - (least.total||0) > 5) {
      html += '<div class="alert-item info">📊 Déséquilibre: <strong>' + most.nom + '</strong> (' + most.total + ') vs <strong>' + least.nom + '</strong> (' + (least.total||0) + ')</div>';
      hasAlert = true;
    }
  }
  // Upcoming leaves
  const nextWeek = addDays(today, 7);
  STATE.repos.filter(r => r.debut >= today && r.debut <= nextWeek).forEach(r => {
    html += '<div class="alert-item info">📅 ' + r.agent + ' en ' + r.type + ' à partir du ' + formatDate(r.debut) + '</div>';
    hasAlert = true;
  });
  if (!hasAlert) html += '<div class="text-muted">Aucune alerte active</div>';
  html += '</div></div>';

  ca.innerHTML = html;

  // Render charts
  setTimeout(() => {
    const barCtx = document.getElementById('chartBar');
    const donutCtx = document.getElementById('chartDonut');
    if (!barCtx || !donutCtx) return;

    if (CHART_BAR) { CHART_BAR.destroy(); CHART_BAR = null; }
    if (CHART_DONUT) { CHART_DONUT.destroy(); CHART_DONUT = null; }

    const labels = agents.map(a => a.nom);
    const totData = agents.map(a => stats[a.nom] ? stats[a.nom].total : 0);
    const semData = agents.map(a => stats[a.nom] ? stats[a.nom].semaine : 0);
    const weData = agents.map(a => stats[a.nom] ? stats[a.nom].weekend : 0);
    const colors = agents.map((a,i) => `hsl(${(i*360/agents.length)},60%,55%)`);

    CHART_BAR = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Semaine', data: semData, backgroundColor: '#2E4A7A' },
          { label: 'Week-end', data: weData, backgroundColor: '#3498db' }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top' } },
        scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
      }
    });

    const totalSem = semData.reduce((a,b) => a+b, 0);
    const totalWE = weData.reduce((a,b) => a+b, 0);
    CHART_DONUT = new Chart(donutCtx, {
      type: 'doughnut',
      data: {
        labels: ['Semaine', 'Week-end'],
        datasets: [{ data: [totalSem, totalWE], backgroundColor: ['#2E4A7A','#3498db'] }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  }, 100);
}

  document.querySelectorAll('[id^="' + prefix + '_"]').forEach(el => el.classList.remove('active'));

  btn.closest('.sub-tabs').querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));

function renderModifLog() {
  const logs = [...STATE.logs].sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  let html = '<div class="flex flex-gap mb-2"><button class="btn btn-sm btn-success" onclick="exportLogsExcel()">📊 Export Excel</button></div>';

  if (!logs.length) html += '<tr><td colspan="7" class="empty-state"><p>' + t('noData') + '</p></td></tr>';
  logs.slice(0,200).forEach(l => {
    const oldStr = typeof l.ancienne === 'object' ? JSON.stringify(l.ancienne).substring(0,80) : String(l.ancienne||'—');
    const newStr = typeof l.nouvelle === 'object' ? JSON.stringify(l.nouvelle).substring(0,80) : String(l.nouvelle||'—');
    html += '<tr><td>' + l.timestamp + '</td><td>' + l.user + '</td><td>' + (l.dateISO ? formatDate(l.dateISO) : '—') + '</td>';
    html += '<td><span class="badge badge-info">' + (l.type||'—') + '</span></td>';
    html += '<td><small style="font-size:.72rem">' + oldStr + '</small></td>';
    html += '<td><small style="font-size:.72rem">' + newStr + '</small></td>';
    html += '<td>' + (l.motif||'—') + '</td></tr>';

  return html;
}

function renderAnnualArchive() {

function renderAnnualPlan(year) {
  const entries = STATE.planning.filter(e => e.dateISO.startsWith(year)).sort((a,b) => a.dateISO.localeCompare(b.dateISO));
  const today = todayISO();
  let html = '<div class="table-container"><table><thead><tr>';
  html += '<th>#</th><th>Date</th><th>Jour</th><th>Agent(s)</th><th>Type</th><th>Récup.</th><th>Obs.</th></tr></thead><tbody>';
  entries.forEach((e,i) => {
    const ag = e.agents.filter(a=>a.officiel).map(a=>a.remplacePar||a.nom).join(', ');
    const type = e.isPrev ? 'Préc.' : (e.isWeekend ? 'WE' : 'Sem.');
    const recup = !e.isPrev ? formatDate(getRecupISO(e.dateISO)) : '—';
    const cls = e.dateISO===today ? 'today-row' : (e.isWeekend ? 'weekend-row' : (e.isPrev ? 'prev-row' : ''));
    html += '<tr class="' + cls + '"><td>' + (i+1) + '</td><td>' + e.date + '</td><td>' + e.jour + '</td><td>' + ag + '</td><td>' + type + '</td><td>' + recup + '</td><td>' + (e.obs||'') + '</td></tr>';
  });
  if (!entries.length) html += '<tr><td colspan="7" class="empty-state"><p>' + t('noData') + '</p></td></tr>';
  html += '</tbody></table></div>';
  return html;
}

function renderConnexionLog() {
  const logs = [...STATE.connexions].sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  let html = '<div class="table-container"><table><thead><tr><th>Horodatage</th><th>Utilisateur</th><th>Rôle</th><th>User-Agent</th></tr></thead><tbody>';
  if (!logs.length) html += '<tr><td colspan="4" class="empty-state"><p>' + t('noData') + '</p></td></tr>';
  logs.slice(0,100).forEach(l => {
    html += '<tr><td>' + l.timestamp + '</td><td>' + l.user + '</td><td>' + (l.role||'—') + '</td><td><small style="font-size:.72rem">' + (l.ua||'—') + '</small></td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function setMode(mode) {
  if (!isAdmin()) { showToast('Accès refusé', 'error'); return; }
  if (STATE.settings.mode === mode) return;
  if (!confirm(t('modeChangeConfirm') + ' ' + mode + ' ?')) return;
  STATE.settings.mode = mode;
  STATE.settings.modeChangedDate = todayISO();
  saveState();
  showToast('Mode changé en ' + mode, 'success');
  renderTab9();
}

function saveSettings() {
  const threshold = parseInt(document.getElementById('setThreshold').value);
  const histDays = parseInt(document.getElementById('setHistDays').value);
  if (threshold > 0) STATE.settings.alertThresholdDays = threshold;
  if (histDays > 0) STATE.settings.historyDays = histDays;
  saveState();
  showToast('Paramètres enregistrés', 'success');
}

function toggleDarkMode(input) {
  STATE.theme = input.checked ? 'dark' : 'light';

}

  const html = '<div class="form-group"><label>Login <span class="text-danger">*</span></label><input class="form-control" id="uLogin" placeholder="identifiant"></div>' +

function openEditUser(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  const html = '<div class="form-group"><label>Login</label><input class="form-control" id="uLogin" value="' + u.login + '"></div>' +
    '<div class="form-group"><label>Nom</label><input class="form-control" id="uNom" value="' + u.nom + '"></div>' +
    '<div class="form-group"><label>Rôle</label><select class="form-control" id="uRole">' +
    '<option value="viewer"' + (u.role==='viewer'?' selected':'') + '>Lecteur</option>' +
    '<option value="admin"' + (u.role==='admin'?' selected':'') + '>Administrateur</option>' +
    '</select></div>' +
    '<div class="form-group"><label>' + t('newPassword') + ' (laisser vide pour ne pas changer)</label><input type="password" class="form-control" id="uPass"></div>';
  openModal('✏️ Modifier Utilisateur', html,
    '<button class="btn btn-secondary" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveUser(' + id + ')">Enregistrer</button>');
}

function saveUser(id) {
  const login = document.getElementById('uLogin').value.trim();
  const nom = document.getElementById('uNom').value.trim();
  const role = document.getElementById('uRole').value;
  const pass = document.getElementById('uPass').value;

  if (!login || !nom) { showToast('Login et nom obligatoires', 'error'); return; }

  if (id === 0) {
    if (!pass) { showToast('Mot de passe obligatoire', 'error'); return; }
    if (STATE.users.find(u => u.login === login)) { showToast('Ce login existe déjà', 'error'); return; }
    const newId = nextId(STATE.users);
    STATE.users.push({ id: newId, login, nom, role, password: hashPwd(pass) });
  } else {
    const u = STATE.users.find(x => x.id === id);
    if (!u) return;
    u.login = login; u.nom = nom; u.role = role;
    if (pass) u.password = hashPwd(pass);
  }
  saveState();
  closeModal();
  showToast('Utilisateur enregistré', 'success');
  renderTab9();
}

function deleteUser(id) {
  if (id === STATE.currentUser.id) { showToast('Impossible de supprimer votre propre compte', 'error'); return; }
  if (!confirm('Supprimer cet utilisateur ?')) return;
  STATE.users = STATE.users.filter(u => u.id !== id);
  saveState();
  showToast('Utilisateur supprimé', 'success');
  renderTab9();
}

function confirmReset() {
  if (!confirm(t('resetConfirm'))) return;
  if (!confirm(t('resetConfirm2'))) return;
  localStorage.removeItem(APP_KEY);
  showToast('Données réinitialisées. Rechargement...', 'warning');
  setTimeout(() => location.reload(), 1500);
}

function exportPDF() {
  const { jsPDF } = window.jspdf || {};
  if (!jsPDF) { showToast('jsPDF non disponible — vérifiez votre connexion internet', 'error'); return; }
  showToast('Génération PDF...', 'info');

  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const today = todayISO();
  const entries = STATE.planning.filter(e => e.dateISO >= addDays(today,-3) && e.dateISO <= addDays(today,18))
    .sort((a,b) => a.dateISO.localeCompare(b.dateISO));

  // Header
  doc.setFillColor(27, 42, 74);
  doc.rect(0, 0, 297, 20, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont(undefined, 'bold');
  doc.text('Tour de Permanence — Permanence de l\'EXP', 148.5, 10, { align: 'center' });
  doc.setFontSize(9);
  doc.setFont(undefined, 'normal');
  doc.text('Période: ' + formatDate(addDays(today,-3)) + ' — ' + formatDate(addDays(today,18)) + '   |   Imprimé le: ' + formatDate(today), 148.5, 16, { align: 'center' });

  // Table headers
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(9);
  const colX = [14, 36, 68, 110, 148, 178, 208, 248];
  const headers = ['#', 'Date', 'Jour', 'Permanencier', 'Matricule', 'Type', 'Récupération', 'Observation'];
  doc.setFillColor(46, 74, 122);
  doc.rect(10, 24, 277, 8, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont(undefined, 'bold');
  headers.forEach((h, i) => doc.text(h, colX[i], 29.5));

  // Table rows
  doc.setFont(undefined, 'normal');
  let y = 36;
  entries.forEach((entry, idx) => {
    if (y > 190) {
      doc.addPage();
      doc.setFillColor(27, 42, 74);
      doc.rect(0, 0, 297, 15, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text('Tour de Permanence — EXP (suite)', 148.5, 8, { align: 'center' });
      doc.setFillColor(46, 74, 122);
      doc.rect(10, 17, 277, 7, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont(undefined, 'bold');
      headers.forEach((h, i) => doc.text(h, colX[i], 22.5));
      doc.setFont(undefined, 'normal');
      y = 28;
    }
    const isToday = entry.dateISO === today;
    const isWE = entry.isWeekend;
    const isPrev = entry.isPrev;

    if (isToday) doc.setFillColor(255, 248, 205);
    else if (isPrev) doc.setFillColor(240, 230, 255);
    else if (isWE) doc.setFillColor(224, 240, 255);
    else doc.setFillColor(idx % 2 === 0 ? 250 : 255, idx % 2 === 0 ? 250 : 255, idx % 2 === 0 ? 250 : 255);
    doc.rect(10, y - 4, 277, 7, 'F');

    doc.setTextColor(0, 0, 0);
    const ag = entry.agents.filter(a=>a.officiel).map(a=>a.remplacePar||a.nom).join(', ');
    const mat = entry.agents.filter(a=>a.officiel).map(a=>{ const ag2=getAgentByName(a.nom); return ag2?ag2.matricule:''; }).join(', ');
    const type = isPrev ? 'Préc.' : (isWE ? 'WE' : 'Sem.');
    const recup = !isPrev ? formatDate(getRecupISO(entry.dateISO)) : '—';
    doc.setFontSize(8);
    doc.text(String(idx+1), colX[0], y);
    doc.text(entry.date, colX[1], y);
    doc.text(entry.jour, colX[2], y);
    doc.text(ag.substring(0,20), colX[3], y);
    doc.text(String(mat).substring(0,15), colX[4], y);
    doc.text(type, colX[5], y);
    doc.text(recup, colX[6], y);
    doc.text((entry.obs||'').substring(0,20), colX[7], y);
    y += 7;
  });

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFillColor(27, 42, 74);
    doc.rect(0, 197, 297, 7, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.text('Permanence de l\'EXP — v1.0   |   Page ' + i + '/' + pageCount, 148.5, 201.5, { align: 'center' });
  }

  doc.save('permanence_EXP_' + today + '.pdf');
  showToast('PDF exporté', 'success');
}

function exportExcel() {
  if (!window.XLSX) { showToast('XLSX non disponible', 'error'); return; }
  showToast('Génération Excel...', 'info');
  const wb = XLSX.utils.book_new();
  const today = todayISO();

  // Sheet 1: État Complet
  const data1 = [['#','Date','Jour','Agent(s)','Matricule','Type','Récupération','Précédent','Observation','Modifié par','Motif modif']];
  STATE.planning.sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).forEach((e,i) => {
    const ag = e.agents.filter(a=>a.officiel).map(a=>a.remplacePar||a.nom).join(', ');
    const mat = e.agents.filter(a=>a.officiel).map(a=>{ const ag2=getAgentByName(a.nom); return ag2?ag2.matricule:''; }).join(', ');
    const type = e.isPrev ? 'Précédent' : (e.isWeekend ? 'Week-end' : 'Semaine');
    const recup = !e.isPrev ? formatDate(getRecupISO(e.dateISO)) : '—';
    data1.push([i+1, e.date, e.jour, ag, String(mat), type, recup, e.isPrev?'Oui':'Non', e.obs||'', e.modifiedBy||'', e.modifMotif||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data1), 'État Complet');

  // Sheet 2: Statistiques
  const stats = calcAgentStats();
  const data2 = [['Agent','Matricule','Total','Semaine','Week-end','Doubles','Remplacements','Dernière perm.','Prochaine perm.']];
  getActiveSorted().forEach(a => {
    const s = stats[a.nom]||{};
    data2.push([a.nom, a.matricule, s.total||0, s.semaine||0, s.weekend||0, s.doubles||0, s.replacements||0,
      s.lastPerm ? formatDate(s.lastPerm) : '—', s.nextPerm ? formatDate(s.nextPerm) : '—']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data2), 'Statistiques');

  // Sheet 3: Repos/Absences
  const data3 = [['#','Agent','Type','Début','Fin','Durée','Motif','Saisi par','Date saisie']];
  STATE.repos.forEach((r,i) => {
    data3.push([i+1, r.agent, r.type, formatDate(r.debut), formatDate(r.fin), diffDays(r.debut,r.fin)+1, r.motif||'', r.saisiPar||'', formatDate(r.saisi||today)]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data3), 'Repos-Absences');

  // Sheet 4: Échanges
  const data4 = [['Date','Agent Officiel','Remplaçant','Motif','Saisi par','Date saisie']];
  STATE.echanges.forEach(e => {
    data4.push([formatDate(e.date), e.officiel, e.remplacant, e.motif||'', e.saisiPar||'', e.saisiDate||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data4), 'Échanges');

  // Sheet 5: Journal modifications
  const data5 = [['Horodatage','Utilisateur','Date modifiée','Type','Ancienne valeur','Nouvelle valeur','Motif']];
  STATE.logs.slice(-500).forEach(l => {
    data5.push([l.timestamp, l.user, l.dateISO ? formatDate(l.dateISO) : '—', l.type||'—',
      JSON.stringify(l.ancienne||{}).substring(0,200), JSON.stringify(l.nouvelle||{}).substring(0,200), l.motif||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data5), 'Journal');

  XLSX.writeFile(wb, 'permanence_EXP_' + today + '.xlsx');
  showToast('Excel exporté', 'success');
}

  const colX = [14, 36, 68, 110, 150, 180, 210];
  const headers = ['#', 'Date', 'Jour', 'Permanencier', 'Type', 'Récupération', 'Observation'];
  let y = 28;

  doc.setFillColor(46, 74, 122);
  doc.rect(10, y-5, 277, 7, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont(undefined,'bold');
  doc.setFontSize(8);
  headers.forEach((h,i) => doc.text(h, colX[i], y));
  y += 5;

  entries.forEach((entry, idx) => {
    if (y > 190) {
      doc.addPage();
      y = 15;
      doc.setFillColor(46, 74, 122);
      doc.rect(10, y-5, 277, 7, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont(undefined,'bold');
      headers.forEach((h,i) => doc.text(h, colX[i], y));
      y += 5;
    }
    doc.setFont(undefined,'normal');
    doc.setFillColor(idx%2===0?250:255,idx%2===0?250:255,idx%2===0?250:255);
    doc.rect(10, y-4, 277, 6, 'F');
    doc.setTextColor(0,0,0);
    const ag = entry.agents.filter(a=>a.officiel).map(a=>a.remplacePar||a.nom).join(', ');
    const type = entry.isPrev ? 'Préc.' : (entry.isWeekend ? 'WE' : 'Sem.');
    const recup = !entry.isPrev ? formatDate(getRecupISO(entry.dateISO)) : '—';
    doc.setFontSize(7);
    doc.text(String(idx+1), colX[0], y);
    doc.text(entry.date, colX[1], y);
    doc.text(entry.jour, colX[2], y);
    doc.text(ag.substring(0,22), colX[3], y);
    doc.text(type, colX[4], y);
    doc.text(recup, colX[5], y);
    doc.text((entry.obs||'').substring(0,22), colX[6], y);
    y += 6;
  });

  const pageCount = doc.internal.getNumberOfPages();
  for (let i=1;i<=pageCount;i++) {
    doc.setPage(i);
    doc.setFillColor(27,42,74);
    doc.rect(0,197,297,7,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(7);
    doc.text('Archive ' + year + ' — Permanence EXP   |   Page ' + i + '/' + pageCount, 148.5, 201.5, {align:'center'});
  }
  doc.save('archive_' + year + '.pdf');
  showToast('Archive PDF exportée', 'success');
}

function exportJSON() {
  const data = {
    exportDate: formatDateTime(new Date()),
    version: '1.0',
    agents: STATE.agents,
    planning: STATE.planning,
    repos: STATE.repos,
    echanges: STATE.echanges,
    logs: STATE.logs,
    prevTours: STATE.prevTours,
    settings: STATE.settings,
    users: STATE.users.map(u => ({ ...u }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'perm_EXP_backup_' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Sauvegarde JSON exportée', 'success');
}

function triggerImportJSON() {
  const el = document.getElementById('jsonFileInput') || document.getElementById('jsonFileInput2');
  if (el) el.click();
}

function importJSONFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm(t('importConfirm'))) return;
      if (data.agents) STATE.agents = data.agents;
      if (data.planning) STATE.planning = data.planning;
      if (data.repos) STATE.repos = data.repos;
      if (data.echanges) STATE.echanges = data.echanges;
      if (data.logs) STATE.logs = data.logs;
      if (data.prevTours) STATE.prevTours = migratePrevTours(data.prevTours);
      if (data.settings) STATE.settings = { ...STATE.settings, ...data.settings };
      if (data.users) STATE.users = data.users;
      saveState();
      showToast('Import réussi ! Rechargement...', 'success');
      setTimeout(() => location.reload(), 1000);
    } catch(err) {
      showToast('Fichier JSON invalide: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ════════════════════════════════════════════════════════════
// MODAL UTILITIES
// ════════════════════════════════════════════════════════════
function openModal(title, bodyHTML, footerHTML, extraClass) {
  document.getElementById('mainModalTitle').textContent = title;
  document.getElementById('mainModalBody').innerHTML = bodyHTML;
  document.getElementById('mainModalFooter').innerHTML = footerHTML || '';
  const modal = document.getElementById('mainModal');
  modal.className = 'modal' + (extraClass ? ' ' + extraClass : '');
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function closeQuickModal() {
  document.getElementById('quickModalOverlay').classList.remove('show');
}

function closeQuickModalOverlay(e) {
  if (e.target === document.getElementById('quickModalOverlay')) closeQuickModal();
}

// ════════════════════════════════════════════════════════════
// TOAST NOTIFICATIONS
// ════════════════════════════════════════════════════════════
function showToast(msg, type) {
  type = type || 'info';
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span class="toast-icon">' + icons[type] + '</span><span class="toast-msg">' + msg + '</span><span class="toast-close" onclick="this.parentNode.remove()">✕</span>';
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
}

// ════════════════════════════════════════════════════════════
// LOGS
// ════════════════════════════════════════════════════════════
function addLog(type, dateISO, ancienne, nouvelle, motif) {
  if (!STATE.currentUser) return;
  STATE.logs.push({
    id: 'l' + Date.now() + Math.random().toString(36).slice(2),
    timestamp: formatDateTime(new Date()),
    user: STATE.currentUser.login,
    dateISO: dateISO || null,
    type, ancienne, nouvelle, motif
  });
  // Keep last 1000 logs
  if (STATE.logs.length > MAX_LOGS_RETAINED) STATE.logs = STATE.logs.slice(-MAX_LOGS_RETAINED);
}

// ════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeQuickModal();
  }
  if (e.target.tagName === 'INPUT' && e.key === 'Enter') {
    if (document.getElementById('loginPage').style.display !== 'none') doLogin();
  }
});

// ════════════════════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════════════════════
function init() {
  const loaded = loadState();
  if (!loaded) {
    // First run: init with defaults
    STATE.agents = JSON.parse(JSON.stringify(AGENTS_INIT));
    saveState();
  } else {
    syncPastPlanningToPrevTours();
    saveState();
  }
  applyTheme();
  applyLang();

  // Enter key on login
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
